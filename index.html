<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRAMS — Macro Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a08;--surface:#121108;--surface2:#1c1a10;--surface3:#242218;
  --border:#302e1e;--border2:#403e28;--text:#f2ead6;--text2:#9a9068;--text3:#5e5838;
  --accent:#ff6b1a;--accent2:#e05500;--accent-dim:#2a1a08;
  --protein:#ff6b1a;--carbs:#f0b429;--fat:#e08c3a;--fiber:#c97a30;
  --danger:#e03030;--radius:12px;--radius-sm:8px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif}
button{font-family:'DM Sans',sans-serif;cursor:pointer;border:none;background:none}
input,textarea,select{font-family:'DM Sans',sans-serif}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--surface)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes bob{0%,100%{transform:translateY(0);opacity:.4}50%{transform:translateY(-4px);opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(ellipse at 50% 0%,rgba(255,107,26,.08) 0%,transparent 60%)}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:40px;width:100%;max-width:400px}
.auth-logo{font-family:'DM Serif Display',serif;font-size:34px;color:var(--accent);text-align:center;margin-bottom:4px;letter-spacing:-1px}
.auth-tagline{text-align:center;font-size:13px;color:var(--text3);margin-bottom:32px}
.auth-tabs{display:flex;gap:2px;background:var(--surface2);padding:3px;border-radius:var(--radius-sm);margin-bottom:24px;border:1px solid var(--border)}
.auth-tab{flex:1;padding:8px;border-radius:6px;font-size:13px;font-weight:500;color:var(--text2);text-align:center;cursor:pointer;transition:all .15s}
.auth-tab.active{background:var(--surface);color:var(--text)}
.auth-field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.auth-field label{font-size:12px;color:var(--text3)}
.auth-field input{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;color:var(--text);font-size:14px;outline:none;transition:border-color .15s}
.auth-field input:focus{border-color:var(--accent)}
.auth-btn{width:100%;padding:12px;border-radius:var(--radius-sm);background:var(--accent);color:#0a0a08;font-size:14px;font-weight:700;margin-top:8px;transition:all .15s}
.auth-btn:hover{background:var(--accent2)}
.auth-btn:disabled{opacity:.4;cursor:default}
.auth-error{font-size:12px;color:var(--danger);text-align:center;margin-top:10px}

.app{min-height:100vh;display:flex;flex-direction:column}
.header{border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;background:var(--surface)}
.logo{font-family:'DM Serif Display',serif;font-size:20px;color:var(--accent)}
.nav{display:flex;gap:2px}
.nav-btn{padding:5px 12px;border-radius:var(--radius-sm);font-size:12px;font-weight:500;color:var(--text2);transition:all .15s}
.nav-btn:hover{color:var(--text);background:var(--surface2)}
.nav-btn.active{color:var(--accent);background:var(--accent-dim)}
.header-right{display:flex;align-items:center;gap:8px}
.hbtn{padding:5px 10px;border-radius:var(--radius-sm);font-size:12px;color:var(--text2);border:1px solid var(--border);transition:all .15s}
.hbtn:hover{color:var(--text);border-color:var(--border2)}
.hbtn.active{color:var(--accent);border-color:rgba(255,107,26,.3)}
.hbtn.danger:hover{color:var(--danger);border-color:rgba(224,48,48,.3)}
.spinner-sm{width:10px;height:10px;border:1.5px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
.syncing{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:5px}

.main{flex:1;display:flex}
.sidebar{width:310px;border-right:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;height:calc(100vh - 52px);overflow:hidden}
.content{flex:1;overflow-y:auto;padding:20px}

/* Input area */
.sidebar-top{padding:12px;border-bottom:1px solid var(--border)}
.input-mode-tabs{display:flex;gap:2px;margin-bottom:10px;background:var(--surface2);padding:3px;border-radius:var(--radius-sm);border:1px solid var(--border)}
.input-mode-tab{flex:1;padding:5px;border-radius:5px;font-size:11px;font-weight:500;color:var(--text3);text-align:center;cursor:pointer;transition:all .15s}
.input-mode-tab.active{background:var(--surface);color:var(--accent)}
.chat-wrap{display:flex;gap:6px;align-items:flex-end}
.chat-textarea{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 11px;color:var(--text);font-size:13px;resize:none;min-height:38px;max-height:100px;outline:none;transition:border-color .15s;line-height:1.5}
.chat-textarea:focus{border-color:var(--border2)}
.send-btn{width:34px;height:34px;border-radius:var(--radius-sm);background:var(--accent);color:#0a0a08;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.send-btn:hover{background:var(--accent2)}
.send-btn:disabled{opacity:.4;cursor:default}
.hint{font-size:11px;color:var(--text3);margin-top:6px;line-height:1.4}

/* Manual macro inputs */
.manual-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.manual-field{display:flex;flex-direction:column;gap:3px}
.manual-field label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em}
.manual-field input{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 10px;color:var(--text);font-size:13px;outline:none;transition:border-color .15s;width:100%}
.manual-field input:focus{border-color:var(--accent)}
.manual-name{display:flex;flex-direction:column;gap:3px;margin-bottom:8px}
.manual-name label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em}
.manual-name input{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 10px;color:var(--text);font-size:13px;outline:none;transition:border-color .15s;width:100%}
.manual-name input:focus{border-color:var(--accent)}
.add-btn{width:100%;padding:9px;border-radius:var(--radius-sm);background:var(--accent);color:#0a0a08;font-size:13px;font-weight:700;transition:all .15s}
.add-btn:hover{background:var(--accent2)}

/* Log */
.log{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:6px}
.log-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 11px;animation:fadeIn .2s ease}
.log-item-header{display:flex;justify-content:space-between;align-items:flex-start;gap:6px}
.log-name{font-size:13px;font-weight:500;color:var(--text);line-height:1.3}
.log-time{font-size:10px;color:var(--text3);flex-shrink:0}
.log-macros{display:flex;gap:6px;margin-top:5px;flex-wrap:wrap}
.mp{font-size:11px;font-weight:500;padding:2px 6px;border-radius:3px}
.mp.cal{background:rgba(255,107,26,.12);color:var(--accent)}
.mp.p{background:rgba(255,107,26,.15);color:var(--protein)}
.mp.c{background:rgba(240,180,41,.15);color:var(--carbs)}
.mp.f{background:rgba(224,140,58,.15);color:var(--fat)}
.mp.fi{background:rgba(201,122,48,.15);color:var(--fiber)}
.log-del{opacity:0;font-size:10px;color:var(--text3);transition:opacity .15s;cursor:pointer;padding:2px 4px}
.log-item:hover .log-del{opacity:1}
.log-del:hover{color:var(--danger)}

/* Meal visual bar */
.meal-bar-wrap{margin-top:7px;cursor:pointer}
.meal-bar{height:5px;border-radius:3px;display:flex;overflow:hidden;gap:1px}
.meal-bar-seg{height:100%;transition:width .4s ease}
.meal-bar-detail{margin-top:6px;display:flex;gap:10px;flex-wrap:wrap}
.meal-bar-label{font-size:10px;display:flex;align-items:center;gap:4px}
.meal-bar-dot{width:7px;height:7px;border-radius:2px;flex-shrink:0}

/* Loading */
.loading-bubble{display:flex;gap:4px;align-items:center;padding:4px 0}
.loading-bubble span{width:4px;height:4px;border-radius:50%;background:var(--accent);animation:bob 1s ease-in-out infinite}
.loading-bubble span:nth-child(2){animation-delay:.2s}
.loading-bubble span:nth-child(3){animation-delay:.4s}

/* Estimate dialog */
.estimate-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:999}
.estimate-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;max-width:360px;width:90%;animation:fadeIn .2s ease}
.estimate-title{font-family:'DM Serif Display',serif;font-size:20px;margin-bottom:6px}
.estimate-food{font-size:13px;color:var(--accent);margin-bottom:4px;font-weight:500}
.estimate-macros{font-size:12px;color:var(--text2);margin-bottom:16px;line-height:1.6}
.estimate-btns{display:flex;gap:8px}
.ebtn{flex:1;padding:10px 6px;border-radius:var(--radius-sm);font-size:12px;font-weight:600;text-align:center;transition:all .15s;border:1px solid var(--border)}
.ebtn.under{background:rgba(240,180,41,.1);color:var(--carbs);border-color:rgba(240,180,41,.2)}
.ebtn.under:hover{background:rgba(240,180,41,.2)}
.ebtn.avg{background:rgba(255,107,26,.1);color:var(--accent);border-color:rgba(255,107,26,.2)}
.ebtn.avg:hover{background:rgba(255,107,26,.2)}
.ebtn.over{background:rgba(224,48,48,.1);color:var(--danger);border-color:rgba(224,48,48,.2)}
.ebtn.over:hover{background:rgba(224,48,48,.2)}

/* Confirm */
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:999}
.confirm-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;max-width:320px;text-align:center}
.confirm-title{font-family:'DM Serif Display',serif;font-size:20px;margin-bottom:8px}
.confirm-text{font-size:13px;color:var(--text2);margin-bottom:20px;line-height:1.5}
.confirm-btns{display:flex;gap:10px;justify-content:center}
.confirm-yes{padding:8px 20px;border-radius:var(--radius-sm);background:var(--danger);color:white;font-size:13px;font-weight:500}
.confirm-no{padding:8px 20px;border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);font-size:13px;font-weight:500;border:1px solid var(--border)}

/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px}
.card-title{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:14px;font-weight:500}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.stat-big{font-family:'DM Serif Display',serif;font-size:34px;line-height:1;color:var(--text)}
.stat-unit{font-size:13px;color:var(--text2);margin-left:4px}
.progress-bar{height:5px;background:var(--surface3);border-radius:3px;overflow:hidden;margin-top:7px}
.progress-fill{height:100%;border-radius:3px;transition:width .5s ease}
.macro-row{display:flex;flex-direction:column;gap:5px}
.macro-label-row{display:flex;justify-content:space-between;align-items:baseline}
.macro-name{font-size:13px;font-weight:500}
.macro-vals{font-size:12px;color:var(--text2)}
.section-title{font-family:'DM Serif Display',serif;font-size:22px;margin-bottom:18px;color:var(--text)}
.save-btn{padding:9px 18px;border-radius:var(--radius-sm);background:var(--accent);color:#0a0a08;font-size:13px;font-weight:700;transition:all .15s}
.save-btn:hover{background:var(--accent2)}
.ai-advice{background:var(--accent-dim);border:1px solid rgba(255,107,26,.2);border-radius:var(--radius);padding:14px;font-size:13px;color:var(--text2);line-height:1.6;white-space:pre-wrap}
.ai-header{font-size:11px;color:var(--accent);font-weight:500;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.week-bar-wrap{display:flex;gap:3px;align-items:flex-end;height:80px}
.week-bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.week-bar{width:100%;border-radius:3px 3px 0 0;min-height:3px;transition:height .4s ease}
.day-label{font-size:10px;color:var(--text3)}
.goal-row{display:flex;flex-direction:column;gap:5px}
.goal-row label{font-size:12px;color:var(--text3)}
.goal-row input{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 11px;color:var(--text);font-size:13px;outline:none;width:100%;transition:border-color .15s}
.goal-row input:focus{border-color:var(--accent)}
.goal-row select{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 11px;color:var(--text);font-size:13px;outline:none;width:100%}
.empty-state{text-align:center;padding:36px 16px;color:var(--text3);font-size:13px}
.empty-icon{font-size:28px;margin-bottom:8px;opacity:.5}
.micro-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.micro-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 11px}
.micro-name{font-size:10px;color:var(--text3);margin-bottom:2px}
.micro-val{font-size:14px;font-weight:500;color:var(--text)}
.micro-goal-bar{height:3px;background:var(--surface3);border-radius:2px;margin-top:5px;overflow:hidden}
.micro-goal-fill{height:100%;border-radius:2px;transition:width .5s ease}
.advice-history-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;margin-bottom:8px}
.advice-history-date{font-size:10px;color:var(--text3);margin-bottom:6px}
.advice-history-text{font-size:12px;color:var(--text2);line-height:1.6;white-space:pre-wrap}

/* AI Chat */
.ai-chat-wrap{display:flex;flex-direction:column;gap:10px}
.ai-chat-msg{padding:12px 14px;border-radius:var(--radius-sm);font-size:13px;line-height:1.6;animation:fadeIn .2s ease}
.ai-chat-msg.user{background:var(--accent-dim);border:1px solid rgba(255,107,26,.2);color:var(--text);align-self:flex-end;max-width:85%}
.ai-chat-msg.ai{background:var(--surface2);border:1px solid var(--border);color:var(--text2);align-self:flex-start;max-width:85%}
.ai-chat-msg.ai strong{color:var(--accent)}

/* Settings */
.settings-section{margin-bottom:20px}
.settings-label{font-size:12px;color:var(--text3);margin-bottom:10px;text-transform:uppercase;letter-spacing:.06em;font-weight:500}
.toggle-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:6px}
.toggle-label{font-size:13px;color:var(--text)}
.toggle-desc{font-size:11px;color:var(--text3);margin-top:2px}
.toggle{width:36px;height:20px;border-radius:10px;background:var(--border2);position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--accent)}
.toggle::after{content:'';position:absolute;width:14px;height:14px;border-radius:50%;background:white;top:3px;left:3px;transition:left .2s}
.toggle.on::after{left:19px}
</style>
</head>
<body>
<div id="root"></div>
<script>
const SUPABASE_URL  = 'https://zadiqpsrtkuxjsvyyncb.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InphZGlxcHNydGt1eGpzdnl5bmNiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2NDczMDksImV4cCI6MjA5NTIyMzMwOX0.1sAhTCse0BNigpp0CdmCeCNQ-N5WaOqxkLsdpSjf8Ww';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
const { useState, useEffect, useRef } = React;

function getToday() { return new Date().toISOString().split('T')[0]; }
function getLast7Days() {
  return Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(6-i));return d.toISOString().split('T')[0];});
}

const DEFAULT_GOALS = {calories:2000,protein:150,carbs:200,fat:65,weight:75,target_weight:70,body_fat:20,target_body_fat:15};
const DEFAULT_SETTINGS = {advancedMode:false,estimateMode:'ask',showMealBars:true};
const MICRO_GOALS = {vitaminC:{label:'Vitamin C',unit:'mg',goal:90},vitaminD:{label:'Vitamin D',unit:'mcg',goal:15},calcium:{label:'Calcium',unit:'mg',goal:1000},iron:{label:'Iron',unit:'mg',goal:18},sodium:{label:'Sodium',unit:'mg',goal:2300},potassium:{label:'Potassium',unit:'mg',goal:4700},magnesium:{label:'Magnesium',unit:'mg',goal:420},zinc:{label:'Zinc',unit:'mg',goal:11}};
const MICRO_COLORS = {vitaminC:'#f0b429',vitaminD:'#ff6b1a',calcium:'#e08c3a',iron:'#c97a30',sodium:'#e03030',potassium:'#ff9950',magnesium:'#e07040',zinc:'#ffb347'};

// ── Auth ───────────────────────────────────────────────────────
function AuthScreen({onAuth}) {
  const [tab,setTab]=useState('login');
  const [email,setEmail]=useState('');
  const [pass,setPass]=useState('');
  const [name,setName]=useState('');
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState('');
  const [msg,setMsg]=useState('');

  async function submit() {
    setError('');setMsg('');setLoading(true);
    if(tab==='login'){
      const {data,error:e}=await sb.auth.signInWithPassword({email,password:pass});
      if(e)setError(e.message);else onAuth(data.user);
    } else {
      const {data,error:e}=await sb.auth.signUp({email,password:pass,options:{data:{display_name:name}}});
      if(e)setError(e.message);
      else if(data.user&&!data.session)setMsg('Check your email to confirm, then sign in.');
      else if(data.user)onAuth(data.user);
    }
    setLoading(false);
  }
  const onKey=e=>{if(e.key==='Enter')submit();};

  return React.createElement('div',{className:'auth-screen'},
    React.createElement('div',{className:'auth-card'},
      React.createElement('div',{className:'auth-logo'},'GRAMS'),
      React.createElement('div',{className:'auth-tagline'},'AI-powered macro & nutrition tracking'),
      React.createElement('div',{className:'auth-tabs'},
        ['login','signup'].map(t=>React.createElement('div',{key:t,className:'auth-tab'+(tab===t?' active':''),onClick:()=>{setTab(t);setError('');setMsg('')}},t==='login'?'Sign in':'Create account'))
      ),
      tab==='signup'&&React.createElement('div',{className:'auth-field'},React.createElement('label',null,'Name'),React.createElement('input',{type:'text',placeholder:'Your name',value:name,onChange:e=>setName(e.target.value),onKeyDown:onKey})),
      React.createElement('div',{className:'auth-field'},React.createElement('label',null,'Email'),React.createElement('input',{type:'email',placeholder:'you@example.com',value:email,onChange:e=>setEmail(e.target.value),onKeyDown:onKey})),
      React.createElement('div',{className:'auth-field'},React.createElement('label',null,'Password'),React.createElement('input',{type:'password',placeholder:'••••••••',value:pass,onChange:e=>setPass(e.target.value),onKeyDown:onKey})),
      React.createElement('button',{className:'auth-btn',onClick:submit,disabled:loading},loading?'Please wait…':tab==='login'?'Sign in':'Create account'),
      msg&&React.createElement('div',{style:{fontSize:'12px',color:'var(--accent)',textAlign:'center',marginTop:'12px'}},msg),
      error&&React.createElement('div',{className:'auth-error'},error)
    )
  );
}

// ── Meal Bar Visual ────────────────────────────────────────────
function MealBar({entry,expanded,onToggle}) {
  const total=(entry.protein||0)+(entry.carbs||0)+(entry.fat||0)||1;
  const segs=[
    {color:'#ff6b1a',pct:((entry.protein||0)/total)*100,label:'P',val:entry.protein||0},
    {color:'#f0b429',pct:((entry.carbs||0)/total)*100,label:'C',val:entry.carbs||0},
    {color:'#e08c3a',pct:((entry.fat||0)/total)*100,label:'F',val:entry.fat||0},
  ];
  return React.createElement('div',{className:'meal-bar-wrap',onClick:onToggle},
    React.createElement('div',{className:'meal-bar'},
      segs.map((s,i)=>React.createElement('div',{key:i,className:'meal-bar-seg',style:{width:s.pct+'%',background:s.color}}))
    ),
    expanded&&React.createElement('div',{className:'meal-bar-detail'},
      segs.map((s,i)=>React.createElement('div',{key:i,className:'meal-bar-label'},
        React.createElement('div',{className:'meal-bar-dot',style:{background:s.color}}),

// ── Pie Chart ──────────────────────────────────────────────────
function PieChart({protein,carbs,fat}) {
  const ref=useRef(null),chart=useRef(null);
  useEffect(()=>{
    if(!ref.current)return;
    if(chart.current)chart.current.destroy();
    const total=protein+carbs+fat;
    if(total===0)return;
    chart.current=new Chart(ref.current,{type:'doughnut',data:{labels:['Protein','Carbs','Fat'],datasets:[{data:[protein,carbs,fat],backgroundColor:['#ff6b1a','#f0b429','#e08c3a'],borderWidth:0,hoverOffset:4}]},options:{responsive:true,maintainAspectRatio:false,cutout:'68%',plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${ctx.raw}g (${Math.round((ctx.raw/total)*100)}%)`}}}}});
    return()=>{if(chart.current)chart.current.destroy();};
  },[protein,carbs,fat]);
  const total=protein+carbs+fat;
  const pcts=[protein,carbs,fat].map(v=>total>0?Math.round((v/total)*100):0);
  return React.createElement('div',{style:{display:'flex',alignItems:'center',gap:'18px'}},
    React.createElement('div',{style:{position:'relative',width:'120px',height:'120px',flexShrink:0}},React.createElement('canvas',{ref})),
    React.createElement('div',{style:{display:'flex',flexDirection:'column',gap:'9px'}},
      [['Protein',pcts[0],'#ff6b1a'],['Carbs',pcts[1],'#f0b429'],['Fat',pcts[2],'#e08c3a']].map(([n,p,c])=>

// ── Week Chart ─────────────────────────────────────────────────

  const vals=days.map(d=>(entries[d]||[]).reduce((s,e)=>s+(e.calories||0),0));

// ── MacroBar ───────────────────────────────────────────────────
function MacroBar({label,current,goal,color}) {
  const pct=goal>0?Math.min(100,(current/goal)*100):0;
  const over=current>goal&&goal>0;
  return React.createElement('div',{className:'macro-row'},
    React.createElement('div',{className:'macro-label-row'},
      React.createElement('span',{className:'macro-name',style:{color}},label),
      React.createElement('span',{className:'macro-vals'},`${Math.round(current)}g${goal>0?` / ${goal}g`:''}`)

    goal>0&&React.createElement('div',{className:'progress-bar'},React.createElement('div',{className:'progress-fill',style:{width:pct+'%',background:over?'#e03030':color}}))
  );
}

// ── Main App ───────────────────────────────────────────────────
function App({user,onLogout}) {

  const [input,setInput]=useState('');

  const [manual,setManual]=useState({name:'',calories:'',protein:'',carbs:'',fat:'',fiber:''});
  const [loading,setLoading]=useState(false);
  const [syncing,setSyncing]=useState(false);
  const [aiAdvice,setAiAdvice]=useState('');

    if(!res.ok){const t=await res.text();throw new Error('API '+res.status+': '+t.slice(0,100));}
    const data=await res.json();
    if(data.error)throw new Error(data.error.message||JSON.stringify(data.error));

    const msg=input.trim();

    setLoading(true);
    const system=`You are a precise nutrition AI. Analyse the food description and return ONLY valid JSON, no markdown, no text before or after.

{
  "name": "descriptive food name",
  "avg": {"calories": number, "protein": number, "carbs": number, "fat": number, "fiber": number},
  "under": {"calories": number, "protein": number, "carbs": number, "fat": number, "fiber": number},
  "over": {"calories": number, "protein": number, "carbs": number, "fat": number, "fiber": number}${settings.advancedMode?`,
  "micros": {"vitaminC": number, "vitaminD": number, "calcium": number, "iron": number, "sodium": number, "potassium": number, "magnesium": number, "zinc": number}`:''}
}

under = conservative/lighter estimate, avg = standard/average, over = generous/heavier estimate.
For branded/restaurant items estimate as accurately as possible.
All values must be numbers. Never return null.`;

    try {
      const raw=await callClaude([{role:'user',content:msg}],system);
      const clean=raw.replace(/```json|```/g,'').trim();
      const s=clean.indexOf('{'),e=clean.lastIndexOf('}');
      if(s===-1||e===-1)throw new Error('No JSON in response: '+raw.slice(0,200));
      const food=JSON.parse(clean.slice(s,e+1));
      food.micros=food.micros||{};

      if(settings.estimateMode==='ask'){
        setPendingFood(food);
      } else {
        const choice=settings.estimateMode==='under'?food.under:settings.estimateMode==='over'?food.over:food.avg;
        await saveEntry({name:food.name,...choice,micros:food.micros});
      }
    } catch(err){
      console.error('handleSend error:',err);
      const today=getToday();
      setEntries(prev=>({...prev,[today]:[...(prev[today]||[]),{id:Date.now(),isError:true,name:'\u26a0 '+err.message,time:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}]}));
    }
    setLoading(false);
  }

    const name=manual.name.trim()||`${cal} kcal meal`;
    saveEntry({name,calories:cal,protein:p,carbs:c,fat:f,fiber:fi,micros:{}});
    setManual({name:'',calories:'',protein:'',carbs:'',fat:'',fiber:''});

// ── Root ───────────────────────────────────────────────────────
function Root() {
  const [user,setUser]=useState(null);
  const [checking,setChecking]=useState(true);
  useEffect(()=>{
    sb.auth.getSession().then(({data})=>{setUser(data.session?.user||null);setChecking(false);});
    const {data:listener}=sb.auth.onAuthStateChange((_e,session)=>{setUser(session?.user||null);});
    return()=>listener.subscription.unsubscribe();
  },[]);

  if(checking)return React.createElement('div',{style:{height:'100vh',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:'14px',background:'#0a0a08'}},
    React.createElement('div',{style:{fontFamily:'DM Serif Display,serif',fontSize:'28px',color:'#ff6b1a'}},'GRAMS'),
    React.createElement('div',{style:{width:'18px',height:'18px',border:'2px solid #302e1e',borderTopColor:'#ff6b1a',borderRadius:'50%',animation:'spin .7s linear infinite'}})
  );
  if(!user)return React.createElement(AuthScreen,{onAuth:setUser});
  return React.createElement(App,{user,onLogout:async()=>{await sb.auth.signOut();setUser(null);}});
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(Root));
