<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>GRAMS — Macro Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a08;--surface:#121108;--surface2:#1c1a10;--surface3:#242218;
  --border:#302e1e;--border2:#403e28;--text:#f2ead6;--text2:#9a9068;--text3:#5e5838;
  --accent:#ff6b1a;--accent2:#e05500;--accent-dim:#2a1a08;
  --protein:#ff6b1a;--carbs:#f0b429;--fat:#e08c3a;--fiber:#c97a30;
  --danger:#e03030;--radius:12px;--radius-sm:8px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;-webkit-text-size-adjust:100%}
button{font-family:'DM Sans',sans-serif;cursor:pointer;border:none;background:none}
input,textarea,select{font-family:'DM Sans',sans-serif}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--surface)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes bob{0%,100%{transform:translateY(0);opacity:.4}50%{transform:translateY(-4px);opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ── Auth ── */
.auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(ellipse at 50% 0%,rgba(255,107,26,.08),transparent 60%)}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:36px;width:100%;max-width:400px}
.auth-logo{font-family:'DM Serif Display',serif;font-size:34px;color:var(--accent);text-align:center;margin-bottom:4px;letter-spacing:-1px}
.auth-tagline{text-align:center;font-size:13px;color:var(--text3);margin-bottom:28px}
.auth-tabs{display:flex;gap:2px;background:var(--surface2);padding:3px;border-radius:var(--radius-sm);margin-bottom:20px;border:1px solid var(--border)}
.auth-tab{flex:1;padding:8px;border-radius:6px;font-size:13px;font-weight:500;color:var(--text2);text-align:center;cursor:pointer;transition:all .15s}
.auth-tab.active{background:var(--surface);color:var(--text)}
.auth-field{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.auth-field label{font-size:12px;color:var(--text3)}
.auth-field input{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;color:var(--text);font-size:14px;outline:none;transition:border-color .15s;-webkit-appearance:none}
.auth-field input:focus{border-color:var(--accent)}
.auth-btn{width:100%;padding:12px;border-radius:var(--radius-sm);background:var(--accent);color:#0a0a08;font-size:14px;font-weight:700;margin-top:6px;transition:all .15s;-webkit-appearance:none}
.auth-btn:hover{background:var(--accent2)}
.auth-btn:disabled{opacity:.4}
.auth-msg{font-size:12px;text-align:center;margin-top:10px}

/* ── App shell ── */
.app{min-height:100vh;display:flex;flex-direction:column;padding-bottom:env(safe-area-inset-bottom)}
.header{border-bottom:1px solid var(--border);padding:0 20px;height:52px;display:flex;align-items:center;justify-content:space-between;background:var(--surface);position:sticky;top:0;z-index:50;padding-top:env(safe-area-inset-top)}
.logo{font-family:'DM Serif Display',serif;font-size:20px;color:var(--accent);letter-spacing:-.5px}
.nav-desktop{display:flex;gap:2px}
.nav-btn{padding:5px 12px;border-radius:var(--radius-sm);font-size:12px;font-weight:500;color:var(--text2);transition:all .15s}
.nav-btn:hover{color:var(--text);background:var(--surface2)}
.nav-btn.active{color:var(--accent);background:var(--accent-dim)}
.hbtn{padding:5px 10px;border-radius:var(--radius-sm);font-size:12px;color:var(--text2);border:1px solid var(--border);transition:all .15s}
.hbtn:hover{color:var(--text)}
.hbtn.red:hover{color:var(--danger);border-color:rgba(224,48,48,.3)}
.syncing{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:5px}
.spinner-sm{width:9px;height:9px;border:1.5px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}

/* ── Mobile bottom nav ── */
.mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);z-index:50;padding-bottom:env(safe-area-inset-bottom)}
.mnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 2px 6px;font-size:9px;font-weight:500;color:var(--text3);gap:3px;cursor:pointer;transition:color .15s;border:none;background:none;font-family:'DM Sans',sans-serif}
.mnav-btn.active{color:var(--accent)}
.mnav-icon{font-size:18px;line-height:1}

/* ── Layout ── */
.main{flex:1;display:flex;overflow:hidden;height:calc(100vh - 52px)}
.sidebar{width:300px;flex-shrink:0;border-right:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;overflow:hidden}
.content{flex:1;overflow-y:auto;padding:20px}

/* ── Sidebar input ── */
.sidebar-top{padding:12px;border-bottom:1px solid var(--border);flex-shrink:0}
.mode-tabs{display:flex;gap:2px;background:var(--surface2);padding:3px;border-radius:var(--radius-sm);border:1px solid var(--border);margin-bottom:10px}
.mode-tab{flex:1;padding:5px;border-radius:5px;font-size:11px;font-weight:500;color:var(--text3);text-align:center;cursor:pointer;transition:all .15s}
.mode-tab.active{background:var(--surface);color:var(--accent)}
.meal-name-input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 10px;color:var(--text);font-size:12px;outline:none;transition:border-color .15s;margin-bottom:7px;-webkit-appearance:none}
.meal-name-input:focus{border-color:var(--accent)}
.chat-row{display:flex;gap:6px;align-items:flex-end}
.chat-ta{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 11px;color:var(--text);font-size:13px;resize:none;min-height:38px;max-height:100px;outline:none;line-height:1.5;-webkit-appearance:none}
.chat-ta:focus{border-color:var(--border2)}
.send-btn{width:34px;height:34px;border-radius:var(--radius-sm);background:var(--accent);color:#0a0a08;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.send-btn:hover{background:var(--accent2)}
.send-btn:disabled{opacity:.4}
.hint{font-size:11px;color:var(--text3);margin-top:5px;line-height:1.4}
.sub-btns{display:flex;gap:5px;margin-top:6px}
.sub-btn{font-size:11px;color:var(--text3);background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:4px 8px;cursor:pointer;transition:all .15s}
.sub-btn:hover{color:var(--text);border-color:var(--border2)}
.sub-btn.on{color:var(--accent);border-color:rgba(255,107,26,.3)}
.override-panel{margin-top:8px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px}
.override-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:6px}
.override-field{display:flex;flex-direction:column;gap:3px}
.override-field label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em}
.override-field input{background:var(--surface3);border:1px solid var(--border);border-radius:5px;padding:5px 8px;color:var(--text);font-size:12px;outline:none;width:100%;-webkit-appearance:none}
.manual-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.manual-field{display:flex;flex-direction:column;gap:3px}
.manual-field label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em}
.manual-field input{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 9px;color:var(--text);font-size:13px;outline:none;width:100%;-webkit-appearance:none}
.manual-field input:focus{border-color:var(--accent)}
.add-btn{width:100%;padding:9px;border-radius:var(--radius-sm);background:var(--accent);color:#0a0a08;font-size:13px;font-weight:700;transition:all .15s}

/* ── Log ── */
.log{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:6px}
.log-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 11px;animation:fadeIn .2s ease}
.log-header{display:flex;justify-content:space-between;align-items:flex-start;gap:6px}
.log-name{font-size:13px;font-weight:500;color:var(--text);line-height:1.3}
.log-desc{font-size:10px;color:var(--text3);margin-top:2px;font-style:italic;line-height:1.3}
.log-time{font-size:10px;color:var(--text3);flex-shrink:0}
.log-del{opacity:0;font-size:10px;color:var(--text3);cursor:pointer;padding:2px 4px;transition:opacity .15s}
.log-item:hover .log-del{opacity:1}
.log-del:hover{color:var(--danger)}
.log-pills{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap}
.mp{font-size:11px;font-weight:500;padding:2px 6px;border-radius:3px;cursor:default}
.mp.cal{background:rgba(255,107,26,.12);color:var(--accent)}
.mp.p{background:rgba(255,107,26,.15);color:var(--protein)}
.mp.c{background:rgba(240,180,41,.15);color:var(--carbs)}
.mp.f{background:rgba(224,140,58,.15);color:var(--fat)}
.mp.fi{background:rgba(201,122,48,.15);color:var(--fiber)}
.log-save-btn{font-size:10px;color:var(--text3);background:none;border:none;cursor:pointer;padding:0;margin-top:3px;transition:color .15s}
.log-save-btn:hover{color:var(--accent)}
.meal-bar{height:4px;border-radius:2px;display:flex;overflow:hidden;gap:1px;margin-top:6px;cursor:pointer}
.meal-bar-seg{height:100%}
.meal-bar-detail{display:flex;gap:8px;margin-top:5px;flex-wrap:wrap}
.meal-bar-lbl{font-size:10px;display:flex;align-items:center;gap:3px;color:var(--text2)}
.meal-bar-dot{width:7px;height:7px;border-radius:2px;flex-shrink:0}

/* ── Loading ── */
.bubble{display:flex;gap:4px;align-items:center;padding:4px 0}
.bubble span{width:4px;height:4px;border-radius:50%;background:var(--accent);animation:bob 1s ease-in-out infinite}
.bubble span:nth-child(2){animation-delay:.2s}
.bubble span:nth-child(3){animation-delay:.4s}

/* ── Cards ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:14px}
.card-title{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:14px;font-weight:500}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.stat-big{font-family:'DM Serif Display',serif;font-size:32px;line-height:1}
.stat-unit{font-size:12px;color:var(--text2);margin-left:3px}
.pbar{height:5px;background:var(--surface3);border-radius:3px;overflow:hidden;margin-top:6px}
.pfill{height:100%;border-radius:3px;transition:width .5s}
.macro-row{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.macro-lrow{display:flex;justify-content:space-between;align-items:baseline}
.macro-name{font-size:13px;font-weight:500}
.macro-vals{font-size:12px;color:var(--text2)}
.section-title{font-family:'DM Serif Display',serif;font-size:22px;margin-bottom:16px}
.save-btn{padding:9px 18px;border-radius:var(--radius-sm);background:var(--accent);color:#0a0a08;font-size:13px;font-weight:700;transition:all .15s}
.save-btn:hover{background:var(--accent2)}
.ai-box{background:var(--accent-dim);border:1px solid rgba(255,107,26,.2);border-radius:var(--radius);padding:14px;font-size:13px;color:var(--text2);line-height:1.6;white-space:pre-wrap}
.ai-hdr{font-size:11px;color:var(--accent);font-weight:500;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.week-bars{display:flex;gap:3px;align-items:flex-end;height:76px}
.wbar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.wbar{width:100%;border-radius:3px 3px 0 0;min-height:3px;transition:height .4s}
.wbar-label{font-size:9px;color:var(--text3)}
.goal-row{display:flex;flex-direction:column;gap:5px;margin-bottom:10px}
.goal-row label{font-size:12px;color:var(--text3)}
.goal-row input{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 11px;color:var(--text);font-size:13px;outline:none;width:100%;-webkit-appearance:none}
.goal-row input:focus{border-color:var(--accent)}
.empty{text-align:center;padding:32px 16px;color:var(--text3);font-size:13px}
.empty-icon{font-size:28px;margin-bottom:8px;opacity:.5}
.micro-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.micro-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 11px}
.micro-name{font-size:10px;color:var(--text3);margin-bottom:2px}
.micro-val{font-size:14px;font-weight:500}
.micro-bar{height:3px;background:var(--surface3);border-radius:2px;margin-top:5px;overflow:hidden}
.micro-fill{height:100%;border-radius:2px;transition:width .5s}

/* ── Overlays ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.overlay-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius) var(--radius) 0 0;width:100%;max-width:520px;max-height:85vh;display:flex;flex-direction:column;padding:20px;animation:fadeIn .2s ease}
.overlay-title{font-family:'DM Serif Display',serif;font-size:18px;margin-bottom:14px}
.overlay-close{font-size:16px;color:var(--text3);cursor:pointer;line-height:1}
.estimate-btns{display:flex;gap:8px}
.ebtn{flex:1;padding:10px 6px;border-radius:var(--radius-sm);font-size:12px;font-weight:600;text-align:center;cursor:pointer;border:1px solid var(--border);transition:all .15s;background:none}
.ebtn.under{color:var(--carbs);border-color:rgba(240,180,41,.3)}
.ebtn.under:hover{background:rgba(240,180,41,.1)}
.ebtn.avg{color:var(--accent);border-color:rgba(255,107,26,.3)}
.ebtn.avg:hover{background:rgba(255,107,26,.1)}
.ebtn.over{color:var(--danger);border-color:rgba(224,48,48,.3)}
.ebtn.over:hover{background:rgba(224,48,48,.1)}
.confirm-btns{display:flex;gap:10px;justify-content:center;margin-top:4px}
.cbtn-yes{padding:8px 20px;border-radius:var(--radius-sm);background:var(--danger);color:white;font-size:13px;font-weight:500}
.cbtn-no{padding:8px 20px;border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);font-size:13px;border:1px solid var(--border)}
.lib-search{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px;color:var(--text);font-size:13px;outline:none;margin-bottom:12px;-webkit-appearance:none}
.lib-search:focus{border-color:var(--accent)}
.lib-list{overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:6px}
.lib-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;display:flex;justify-content:space-between;align-items:center;gap:8px}
.lib-btns{display:flex;gap:6px;flex-shrink:0}
.lib-log{padding:6px 12px;background:var(--accent);color:#0a0a08;border-radius:var(--radius-sm);font-size:12px;font-weight:700;cursor:pointer}
.lib-del{padding:6px 8px;background:rgba(224,48,48,.1);color:var(--danger);border:1px solid rgba(224,48,48,.2);border-radius:var(--radius-sm);font-size:12px;cursor:pointer}

/* ── Settings toggles ── */
.toggle-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:6px}
.toggle-lbl{font-size:13px}
.toggle-desc{font-size:11px;color:var(--text3);margin-top:2px}
.toggle{width:36px;height:20px;border-radius:10px;background:var(--border2);position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--accent)}
.toggle::after{content:'';position:absolute;width:14px;height:14px;border-radius:50%;background:white;top:3px;left:3px;transition:left .2s}
.toggle.on::after{left:19px}
.radio-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:6px;cursor:pointer}
.radio-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--border2);flex-shrink:0;transition:all .15s;position:relative}
.radio-dot.on{border-color:var(--accent);background:var(--accent)}

/* ── Chat ── */
.chat-msgs{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.chat-msg{padding:11px 14px;border-radius:var(--radius-sm);font-size:13px;line-height:1.6;animation:fadeIn .2s ease;max-width:88%}
.chat-msg.user{background:var(--accent-dim);border:1px solid rgba(255,107,26,.2);align-self:flex-end}
.chat-msg.ai{background:var(--surface2);border:1px solid var(--border);color:var(--text2);align-self:flex-start}
.chat-suggestion{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 12px;font-size:12px;color:var(--text2);cursor:pointer;text-align:left;transition:all .15s;width:100%}
.chat-suggestion:hover{border-color:var(--border2);color:var(--text)}

/* ── History ── */
.hist-entry{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-top:1px solid var(--border);gap:8px}
.hist-name{font-size:13px;color:var(--text);font-weight:500;cursor:pointer}
.hist-name:hover{color:var(--accent)}
.hist-desc{font-size:10px;color:var(--text3);font-style:italic;margin-top:1px}
.hist-pill{cursor:pointer;transition:opacity .15s}
.hist-pill:hover{opacity:.7}
.inline-input{background:var(--surface3);border:1px solid var(--accent);border-radius:4px;padding:2px 6px;color:var(--text);font-size:12px;outline:none;-webkit-appearance:none}

/* ── Advice history ── */
.advice-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;margin-bottom:8px}
.advice-date{font-size:10px;color:var(--text3);margin-bottom:6px}
.advice-text{font-size:12px;color:var(--text2);line-height:1.6;white-space:pre-wrap}

/* ── Responsive ── */
@media(max-width:768px){
  .header{height:48px}
  .nav-desktop{display:none}
  .main{flex-direction:column;height:auto;overflow:visible}
  .sidebar{width:100%;border-right:none;border-bottom:1px solid var(--border);max-height:52vh}
  .content{padding:12px;padding-bottom:80px}
  .mobile-nav{display:flex}
  .grid-2{grid-template-columns:1fr}
  .overlay-box{max-height:90vh}
  .app{padding-bottom:0}
}
@media(min-width:769px){
  .mobile-nav{display:none!important}
  .content{padding-bottom:20px}
}
</style>
</head>

<div id="root"></div>
<script>
const SUPABASE_URL  = 'https://zadiqpsrtkuxjsvyyncb.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InphZGlxcHNydGt1eGpzdnl5bmNiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2NDczMDksImV4cCI6MjA5NTIyMzMwOX0.1sAhTCse0BNigpp0CdmCeCNQ-N5WaOqxkLsdpSjf8Ww';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
const {useState,useEffect,useRef} = React;

function last7() {
  return Array.from({length:7},(_,i)=>{const d=new Date();d.setDate(d.getDate()-(6-i));return d.toISOString().split('T')[0];});

function AuthScreen({onAuth}) {
  const [tab,setTab]=useState('login');
  const [email,setEmail]=useState('');
  const [pass,setPass]=useState('');
  const [name,setName]=useState('');
  const [busy,setBusy]=useState(false);
  const [err,setErr]=useState('');
  const [msg,setMsg]=useState('');

  async function submit() {
    setErr('');setMsg('');setBusy(true);
    if(tab==='login'){
      const {data,error}=await sb.auth.signInWithPassword({email,password:pass});
      if(error)setErr(error.message); else onAuth(data.user);
    } else {
      const {data,error}=await sb.auth.signUp({email,password:pass,options:{data:{display_name:name}}});
      if(error)setErr(error.message);
      else if(data.user&&!data.session)setMsg('Check your email to confirm your account.');
      else if(data.user)onAuth(data.user);
    }
    setBusy(false);
  }

  const e=React.createElement;
  return e('div',{className:'auth-screen'},
    e('div',{className:'auth-card'},
      e('div',{className:'auth-logo'},'GRAMS'),
      e('div',{className:'auth-tagline'},'AI-powered macro & nutrition tracking'),
      e('div',{className:'auth-tabs'},
        ['login','signup'].map(t=>e('div',{key:t,className:'auth-tab'+(tab===t?' active':''),onClick:()=>{setTab(t);setErr('');setMsg('')}},t==='login'?'Sign in':'Create account'))
      ),
      tab==='signup'&&e('div',{className:'auth-field'},e('label',null,'Name'),e('input',{type:'text',placeholder:'Your name',value:name,onChange:x=>setName(x.target.value),onKeyDown:x=>{if(x.key==='Enter')submit()}})),
      e('div',{className:'auth-field'},e('label',null,'Email'),e('input',{type:'email',placeholder:'you@example.com',value:email,onChange:x=>setEmail(x.target.value),onKeyDown:x=>{if(x.key==='Enter')submit()}})),
      e('div',{className:'auth-field'},e('label',null,'Password'),e('input',{type:'password',placeholder:'••••••••',value:pass,onChange:x=>setPass(x.target.value),onKeyDown:x=>{if(x.key==='Enter')submit()}})),
      e('button',{className:'auth-btn',onClick:submit,disabled:busy},busy?'Please wait…':tab==='login'?'Sign in':'Create account'),
      msg&&e('div',{className:'auth-msg',style:{color:'var(--accent)'}},msg),
      err&&e('div',{className:'auth-msg',style:{color:'var(--danger)'}},err)
    )
  );
}

function Bubble() {

function MacroBar({label,current,goal,color}) {
  const e=React.createElement;
  const pct=goal>0?Math.min(100,(current/goal)*100):0;
  const over=current>goal&&goal>0;
  return e('div',{className:'macro-row'},
    e('div',{className:'macro-lrow'},
      e('span',{className:'macro-name',style:{color}},label),
      e('span',{className:'macro-vals'},Math.round(current)+'g'+(goal>0?' / '+goal+'g':''))
    ),
    goal>0&&e('div',{className:'pbar'},e('div',{className:'pfill',style:{width:pct+'%',background:over?'#e03030':color}}))
  );
}

function WeekChart({entries}) {
  const e=React.createElement;
  const days=last7(),tod=today();
  const vals=days.map(d=>(entries[d]||[]).reduce((s,x)=>s+(x.calories||0),0));
  const max=Math.max(...vals,1);
  return e('div',{className:'week-bars'},
    days.map((d,i)=>{
      const h=Math.round((vals[i]/max)*68);
      return e('div',{key:d,className:'wbar-col'},
        e('div',{style:{fontSize:'9px',color:vals[i]>0?'var(--text2)':'transparent',marginBottom:'2px'}},vals[i]>0?Math.round(vals[i]):''),
        e('div',{className:'wbar',style:{height:h+'px',background:d===tod?'#ff6b1a':'rgba(255,107,26,.28)'}}),
        e('span',{className:'wbar-label'},['M','T','W','T','F','S','S'][i])
      );
    })
  );
}

function PieChart({protein,carbs,fat}) {
  const e=React.createElement;
  const ref=useRef(null),chart=useRef(null);
  useEffect(()=>{
    if(!ref.current)return;
    if(chart.current)chart.current.destroy();
    const total=protein+carbs+fat;
    if(!total)return;
    chart.current=new Chart(ref.current,{
      type:'doughnut',
      data:{labels:['Protein','Carbs','Fat'],datasets:[{data:[protein,carbs,fat],backgroundColor:['#ff6b1a','#f0b429','#e08c3a'],borderWidth:0,hoverOffset:4}]},
      options:{responsive:true,maintainAspectRatio:false,cutout:'68%',plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${ctx.raw}g (${Math.round((ctx.raw/total)*100)}%)`}}}}
    });
    return()=>{if(chart.current)chart.current.destroy();};
  },[protein,carbs,fat]);
  const total=protein+carbs+fat;
  const pcts=[protein,carbs,fat].map(v=>total?Math.round((v/total)*100):0);
  return e('div',{style:{display:'flex',alignItems:'center',gap:'16px'}},
    e('div',{style:{width:'110px',height:'110px',flexShrink:0}},e('canvas',{ref})),
    e('div',{style:{display:'flex',flexDirection:'column',gap:'8px'}},
      [['Protein',pcts[0],'#ff6b1a'],['Carbs',pcts[1],'#f0b429'],['Fat',pcts[2],'#e08c3a']].map(([n,p,c])=>
        e('div',{key:n,style:{display:'flex',alignItems:'center',gap:'7px'}},
          e('div',{style:{width:'9px',height:'9px',borderRadius:'2px',background:c}}),
          e('span',{style:{fontSize:'12px',color:'var(--text2)',minWidth:'46px'}},n),
          e('span',{style:{fontSize:'13px',fontWeight:500,color:c}},p+'%')
        )
      )
    )
  );
}

function MealBarViz({entry,expanded,onToggle}) {
  const e=React.createElement;

  const segs=[

// ─── Main App ─────────────────────────────────────────────────
function App({user,onLogout}) {
  const e=React.createElement;
  const [view,setView]=useState('today');
  const [settings,setSettings]=useState({advancedMode:false,estimateMode:'ask',showMealBars:true});
  const [entries,setEntries]=useState({});
  const [goals,setGoals]=useState(DEF_GOALS);
  const [savedFoods,setSavedFoods]=useState([]);
  const [adviceHistory,setAdviceHistory]=useState([]);

  // Input state
  const [inputMode,setInputMode]=useState('ai');
  const [aiText,setAiText]=useState('');
  const [mealName,setMealName]=useState('');
  const [showOverride,setShowOverride]=useState(false);
  const [override,setOverride]=useState({calories:'',protein:'',carbs:'',fat:'',fiber:''});
  const [manual,setManual]=useState({name:'',calories:'',protein:'',carbs:'',fat:'',fiber:''});

  // UI state
  const [loading,setLoading]=useState(false);
  const [syncing,setSyncing]=useState(false);
  const [initDone,setInitDone]=useState(false);
  const [pendingFood,setPendingFood]=useState(null);
  const [expandedMeals,setExpandedMeals]=useState({});
  const [showLibrary,setShowLibrary]=useState(false);
  const [libSearch,setLibSearch]=useState('');
  const [showConfirm,setShowConfirm]=useState(false);
  const [editingName,setEditingName]=useState(null);   // {id,date,value}
  const [editingMacro,setEditingMacro]=useState(null); // {id,date,field,value}
  const [goalInput,setGoalInput]=useState({});
  const [weightUnit,setWeightUnit]=useState('kg');
  const [aiAdvice,setAiAdvice]=useState('');
  const [adviceLoading,setAdviceLoading]=useState(false);
  const [chatMsgs,setChatMsgs]=useState([]);
  const [chatInput,setChatInput]=useState('');
  const [chatLoading,setChatLoading]=useState(false);

  const logRef=useRef(null);
  const chatRef=useRef(null);

  // ── Load data ───────────────────────────────────────────────
  useEffect(()=>{
    async function init(){
      setSyncing(true);
      const {data:profile}=await sb.from('profiles').select('*').eq('id',user.id).single();
      if(profile)setSettings(p=>({...p,advancedMode:profile.advanced_mode||false}));

      const {data:g}=await sb.from('goals').select('*').eq('user_id',user.id).single();
      if(g)setGoals({calories:g.calories,protein:g.protein,carbs:g.carbs,fat:g.fat,weight:g.weight,target_weight:g.target_weight,body_fat:g.body_fat,target_body_fat:g.target_body_fat});

      const since=new Date();since.setDate(since.getDate()-60);
      const {data:fe}=await sb.from('food_entries').select('*').eq('user_id',user.id).gte('eaten_date',since.toISOString().split('T')[0]).order('eaten_at',{ascending:true});
      if(fe){
        const map={};
        fe.forEach(row=>{
          const d=row.eaten_date;
          if(!map[d])map[d]=[];
          map[d].push({id:row.id,name:row.name,description:row.description||'',calories:row.calories,protein:row.protein,carbs:row.carbs,fat:row.fat,fiber:row.fiber,micros:row.micros||{},time:new Date(row.eaten_at).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})});
        });
        setEntries(map);
      }

      const {data:sf}=await sb.from('saved_foods').select('*').eq('user_id',user.id).order('use_count',{ascending:false});
      if(sf)setSavedFoods(sf);

      const {data:ah}=await sb.from('ai_advice').select('*').eq('user_id',user.id).order('created_at',{ascending:false}).limit(10);
      if(ah)setAdviceHistory(ah);

      setSyncing(false);setInitDone(true);
    }
    init();
  },[user.id]);

  useEffect(()=>{logRef.current?.scrollIntoView({behavior:'smooth'});},[entries,loading]);
  useEffect(()=>{chatRef.current?.scrollIntoView({behavior:'smooth'});},[chatMsgs,chatLoading]);

  // ── Helpers ──────────────────────────────────────────────────
  const toDisplay=kg=>weightUnit==='lbs'?Math.round(kg*2.20462*10)/10:kg;
  const toKg=v=>weightUnit==='lbs'?Math.round(v/2.20462*10)/10:parseFloat(v);
  const unitLbl=weightUnit==='lbs'?'lbs':'kg';

  async function callClaude(messages,system){
    const res=await fetch('/api/claude',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-5-20250929',max_tokens:1000,system,messages})});
    if(!res.ok){const t=await res.text();throw new Error('API '+res.status+': '+t.slice(0,120));}
    const data=await res.json();
    if(data.error)throw new Error(data.error.message||JSON.stringify(data.error));
    return data.content.map(b=>b.type==='text'?b.text:'').filter(Boolean).join('\n').trim();
  }

  async function saveEntry(entry){
    const tod=today();
    const row={user_id:user.id,name:entry.name,description:entry.description||'',calories:Math.round(entry.calories||0),protein:Math.round(entry.protein||0),carbs:Math.round(entry.carbs||0),fat:Math.round(entry.fat||0),fiber:Math.round(entry.fiber||0),micros:entry.micros||{},eaten_date:tod,eaten_at:new Date().toISOString()};
    const {data:ins,error}=await sb.from('food_entries').insert(row).select().single();
    if(error)throw new Error('DB: '+error.message);
    if(ins){
      const display={...ins,time:new Date(ins.eaten_at).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})};
      setEntries(p=>({...p,[tod]:[...(p[tod]||[]),display]}));
    }
  }

  // ── AI send ──────────────────────────────────────────────────
  async function handleSend(){
    const msg=aiText.trim();
    if(!msg||loading)return;
    setAiText('');
    if(['clear','reset','delete all','wipe','start over'].some(p=>msg.toLowerCase().includes(p))){setShowConfirm(true);return;}
    setLoading(true);
    const sys=`You are a precise nutrition AI. Return ONLY valid JSON, no markdown, no text outside the JSON.

{
  "name": "descriptive food name",
  "avg":   {"calories":number,"protein":number,"carbs":number,"fat":number,"fiber":number},
  "under": {"calories":number,"protein":number,"carbs":number,"fat":number,"fiber":number},
  "over":  {"calories":number,"protein":number,"carbs":number,"fat":number,"fiber":number}${settings.advancedMode?`,
  "micros":{"vitaminC":number,"vitaminD":number,"calcium":number,"iron":number,"sodium":number,"potassium":number,"magnesium":number,"zinc":number}`:''}
}

under=conservative, avg=standard, over=generous. All numbers, never null.`;
    try{
      const raw=await callClaude([{role:'user',content:msg}],sys);
      const s=raw.indexOf('{'),en=raw.lastIndexOf('}');
      if(s===-1)throw new Error('No JSON returned: '+raw.slice(0,150));
      const food=JSON.parse(raw.slice(s,en+1));
      food.micros=food.micros||{};

      // Apply overrides
      const applyOv=vals=>{
        const out={...vals};
        Object.keys(override).forEach(k=>{if(override[k]!=='')out[k]=parseFloat(override[k])||0;});
        return out;
      };
      food.avg=applyOv(food.avg);food.under=applyOv(food.under);food.over=applyOv(food.over);

      if(settings.estimateMode==='ask'){
        setPendingFood(food);
      } else {
        const choice=settings.estimateMode==='under'?food.under:settings.estimateMode==='over'?food.over:food.avg;
        const finalName=mealName.trim()||food.name;
        const desc=mealName.trim()?food.name:'';
        await saveEntry({name:finalName,description:desc,...choice,micros:food.micros});
        setMealName('');setOverride({calories:'',protein:'',carbs:'',fat:'',fiber:''});
      }
    } catch(err){
      const tod=today();
      setEntries(p=>({...p,[tod]:[...(p[tod]||[]),{id:Date.now(),isError:true,name:'⚠ '+err.message,time:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}]}));
    }
    setLoading(false);
  }

  async function handleEstimate(choice){
    if(!pendingFood)return;
    const vals=pendingFood[choice];
    const finalName=mealName.trim()||pendingFood.name;
    const desc=mealName.trim()?pendingFood.name:'';
    try{await saveEntry({name:finalName,description:desc,...vals,micros:pendingFood.micros||{}});}catch(err){console.error(err);}
    setPendingFood(null);setMealName('');setOverride({calories:'',protein:'',carbs:'',fat:'',fiber:''});
  }

  function handleManualAdd(){
    const n=manual.name.trim()||((parseFloat(manual.calories)||0)+' kcal meal');
    saveEntry({name:n,description:'',calories:parseFloat(manual.calories)||0,protein:parseFloat(manual.protein)||0,carbs:parseFloat(manual.carbs)||0,fat:parseFloat(manual.fat)||0,fiber:parseFloat(manual.fiber)||0,micros:{}});
    setManual({name:'',calories:'',protein:'',carbs:'',fat:'',fiber:''});
  }

  // ── Library ──────────────────────────────────────────────────
  async function saveToLibrary(entry){
    const existing=savedFoods.find(f=>f.name.toLowerCase()===entry.name.toLowerCase());
    if(existing){
      await sb.from('saved_foods').update({use_count:existing.use_count+1,updated_at:new Date().toISOString()}).eq('id',existing.id);
      setSavedFoods(p=>p.map(f=>f.id===existing.id?{...f,use_count:f.use_count+1}:f).sort((a,b)=>b.use_count-a.use_count));
      return;
    }
    const row={user_id:user.id,name:entry.name,description:entry.description||'',calories:Math.round(entry.calories||0),protein:Math.round(entry.protein||0),carbs:Math.round(entry.carbs||0),fat:Math.round(entry.fat||0),fiber:Math.round(entry.fiber||0),micros:entry.micros||{}};
    const {data:saved}=await sb.from('saved_foods').insert(row).select().single();
    if(saved)setSavedFoods(p=>[saved,...p]);
  }

  async function logFromLibrary(food){
    await saveEntry({name:food.name,description:food.description||'',calories:food.calories,protein:food.protein,carbs:food.carbs,fat:food.fat,fiber:food.fiber,micros:food.micros||{}});
    await sb.from('saved_foods').update({use_count:food.use_count+1,updated_at:new Date().toISOString()}).eq('id',food.id);
    setSavedFoods(p=>p.map(f=>f.id===food.id?{...f,use_count:f.use_count+1}:f).sort((a,b)=>b.use_count-a.use_count));
    setShowLibrary(false);setView('today');
  }

  async function deleteFromLibrary(id){
    await sb.from('saved_foods').delete().eq('id',id).eq('user_id',user.id);
    setSavedFoods(p=>p.filter(f=>f.id!==id));
  }

  // ── Entry edits ──────────────────────────────────────────────
  async function deleteEntry(date,id){
    await sb.from('food_entries').delete().eq('id',id).eq('user_id',user.id);
    setEntries(p=>({...p,[date]:(p[date]||[]).filter(x=>x.id!==id)}));
  }

  async function updateName(date,id,val){
    if(!val.trim())return;
    await sb.from('food_entries').update({name:val.trim(),updated_at:new Date().toISOString()}).eq('id',id).eq('user_id',user.id);
    setEntries(p=>({...p,[date]:(p[date]||[]).map(x=>x.id===id?{...x,name:val.trim()}:x)}));
    setEditingName(null);
  }

  async function updateMacro(date,id,field,val){
    const num=Math.round(parseFloat(val)||0);
    await sb.from('food_entries').update({[field]:num,updated_at:new Date().toISOString()}).eq('id',id).eq('user_id',user.id);
    setEntries(p=>({...p,[date]:(p[date]||[]).map(x=>x.id===id?{...x,[field]:num}:x)}));
    setEditingMacro(null);
  }

  async function clearAll(){
    await sb.from('food_entries').delete().eq('user_id',user.id);
    await sb.from('ai_advice').delete().eq('user_id',user.id);
    setEntries({});setAdviceHistory([]);setAiAdvice('');setChatMsgs([]);setShowConfirm(false);
  }

  // ── Goals ────────────────────────────────────────────────────
  async function saveGoals(){
    const updated={...goals};
    Object.keys(goalInput).forEach(k=>{
      const v=parseFloat(goalInput[k]);
      if(!isNaN(v)){
        const isW=k==='weight'||k==='target_weight';
        updated[k]=isW?toKg(v):v;
      }
    });
    setGoals(updated);setGoalInput({});
    await sb.from('goals').upsert({user_id:user.id,...updated},{onConflict:'user_id'});
  }

  async function updateSetting(key,val){
    setSettings(p=>({...p,[key]:val}));
    if(key==='advancedMode')await sb.from('profiles').update({advanced_mode:val}).eq('id',user.id);
  }

  // ── AI Advice ────────────────────────────────────────────────
  async function getAdvice(){
    setAdviceLoading(true);
    const days=last7();
    const weekData=days.map(d=>{
      const t=(entries[d]||[]).reduce((a,x)=>({cal:a.cal+(x.calories||0),p:a.p+(x.protein||0),c:a.c+(x.carbs||0),f:a.f+(x.fat||0)}),{cal:0,p:0,c:0,f:0});
      return `${d}: ${Math.round(t.cal)} kcal, ${Math.round(t.p)}g P, ${Math.round(t.c)}g C, ${Math.round(t.f)}g F`;
    }).join('\n');
    try{
      const advice=await callClaude([{role:'user',content:`My week:\n${weekData}\n\nGoals: ${goals.calories} kcal, ${goals.protein}g P, ${goals.carbs}g C, ${goals.fat}g F\nBody: ${goals.weight}kg→${goals.target_weight}kg, BF ${goals.body_fat}%→${goals.target_body_fat}%\n\nGive warm, specific advice in under 200 words with 3 concrete tips.`}],'You are a professional sports nutritionist.');
      setAiAdvice(advice);
      const {data:saved}=await sb.from('ai_advice').insert({user_id:user.id,advice,week_start:days[0]}).select().single();
      if(saved)setAdviceHistory(p=>[saved,...p].slice(0,10));
    }catch(err){setAiAdvice('Error: '+err.message);}
    setAdviceLoading(false);
  }

  // ── AI Chat ──────────────────────────────────────────────────
  async function handleChat(){
    const msg=chatInput.trim();
    if(!msg||chatLoading)return;
    setChatInput('');
    setChatMsgs(p=>[...p,{role:'user',text:msg}]);
    setChatLoading(true);
    const tod=today();
    const todTotals=(entries[tod]||[]).reduce((a,x)=>({cal:a.cal+(x.calories||0),p:a.p+(x.protein||0),c:a.c+(x.carbs||0),f:a.f+(x.fat||0)}),{cal:0,p:0,c:0,f:0});
    const wk=last7().reduce((acc,d)=>{(entries[d]||[]).forEach(x=>{acc.cal+=x.calories||0;acc.p+=x.protein||0;});return acc;},{cal:0,p:0});
    const sys=`You are GRAMS, a direct nutrition AI. Answer in 2-4 sentences. Give clear yes/no answers. Use the user's actual data.\n\nToday: ${Math.round(todTotals.cal)} kcal, ${Math.round(todTotals.p)}g P, ${Math.round(todTotals.c)}g C, ${Math.round(todTotals.f)}g F\nGoals: ${goals.calories} kcal, ${goals.protein}g P, ${goals.carbs}g C, ${goals.fat}g F\nWeek avg/day: ${Math.round(wk.cal/7)} kcal, ${Math.round(wk.p/7)}g P\nBody: ${goals.weight}kg→${goals.target_weight}kg, BF ${goals.body_fat}%→${goals.target_body_fat}%`;
    try{
      const reply=await callClaude([{role:'user',content:msg}],sys);
      setChatMsgs(p=>[...p,{role:'ai',text:reply}]);
    }catch(err){setChatMsgs(p=>[...p,{role:'ai',text:'Error: '+err.message}]);}
    setChatLoading(false);

          e('span',{className:'overlay-close',onClick:()=>setPendingFood(null)},'✕')
        ),
        e('div',{style:{fontSize:'13px',color:'var(--accent)',fontWeight:500,marginBottom:'4px'}},mealName.trim()||pendingFood.name),
        e('div',{style:{fontSize:'12px',color:'var(--text2)',marginBottom:'16px',lineHeight:1.7}},
          'Under: '+pendingFood.under.calories+' kcal | '+pendingFood.under.protein+'p '+pendingFood.under.carbs+'c '+pendingFood.under.fat+'f\n'+
          'Avg: '+pendingFood.avg.calories+' kcal | '+pendingFood.avg.protein+'p '+pendingFood.avg.carbs+'c '+pendingFood.avg.fat+'f\n'+
          'Over: '+pendingFood.over.calories+' kcal | '+pendingFood.over.protein+'p '+pendingFood.over.carbs+'c '+pendingFood.over.fat+'f'
        ),
        e('div',{className:'estimate-btns'},
          e('button',{className:'ebtn under',onClick:()=>handleEstimate('under')},'⬇ Under'),
          e('button',{className:'ebtn avg',onClick:()=>handleEstimate('avg')},'≈ Average'),
          e('button',{className:'ebtn over',onClick:()=>handleEstimate('over')},'⬆ Over')
        )
      )
    ),

    // Library overlay
    showLibrary&&e('div',{className:'overlay',onClick:()=>setShowLibrary(false)},
      e('div',{className:'overlay-box',onClick:x=>x.stopPropagation()},
        e('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'14px'}},
          e('div',{className:'overlay-title'},'My food library'),
          e('span',{className:'overlay-close',onClick:()=>setShowLibrary(false)},'✕')
        ),
        e('input',{className:'lib-search',type:'text',placeholder:'Search saved foods…',value:libSearch,onChange:x=>setLibSearch(x.target.value)}),
        e('div',{className:'lib-list'},
          savedFoods.length===0
            ?e('div',{className:'empty'},e('div',{className:'empty-icon'},'📚'),'No saved foods yet',e('div',{style:{marginTop:'6px',fontSize:'11px'}},'Log a food and tap "+ save to library"'))
            :savedFoods.filter(f=>!libSearch||f.name.toLowerCase().includes(libSearch.toLowerCase())).map(food=>
                e('div',{key:food.id,className:'lib-item'},
                  e('div',{style:{flex:1,minWidth:0}},
                    e('div',{style:{fontSize:'13px',fontWeight:500,marginBottom:'2px'}},food.name),
                    food.description&&e('div',{style:{fontSize:'10px',color:'var(--text3)',fontStyle:'italic',marginBottom:'3px'}},food.description),
                    e('div',{style:{display:'flex',gap:'5px',flexWrap:'wrap'}},
                      e('span',{className:'mp cal'},(food.calories||0)+' kcal'),
                      e('span',{className:'mp p'},'P '+(food.protein||0)+'g'),
                      e('span',{className:'mp c'},'C '+(food.carbs||0)+'g'),
                      e('span',{className:'mp f'},'F '+(food.fat||0)+'g'),
                      food.use_count>1&&e('span',{style:{fontSize:'10px',color:'var(--text3)',padding:'2px 4px'}},'×'+food.use_count)
                    )
                  ),
                  e('div',{className:'lib-btns'},
                    e('button',{className:'lib-log',onClick:()=>logFromLibrary(food)},'Log'),
                    e('button',{className:'lib-del',onClick:()=>deleteFromLibrary(food.id)},'✕')
                  )
                )
              )
        )
      )
    ),

    // Confirm overlay
    showConfirm&&e('div',{className:'overlay',onClick:()=>setShowConfirm(false)},
      e('div',{className:'overlay-box',style:{borderRadius:'var(--radius)',maxWidth:'340px',margin:'auto'},onClick:x=>x.stopPropagation()},
        e('div',{className:'overlay-title'},'Clear all data?'),
        e('div',{style:{fontSize:'13px',color:'var(--text2)',margin:'8px 0 20px',lineHeight:1.5}},'This permanently deletes all food entries and AI advice from your account.'),
        e('div',{className:'confirm-btns'},
          e('button',{className:'cbtn-no',onClick:()=>setShowConfirm(false)},'Cancel'),
          e('button',{className:'cbtn-yes',onClick:clearAll},'Clear all')
        )
      )
    ),

    // Header
    e('header',{className:'header'},
      e('div',{className:'logo'},'GRAMS'),
      e('nav',{className:'nav-desktop'},
        ['today','week','chat','goals','history','advice','settings'].map(v=>
          e('button',{key:v,className:'nav-btn'+(view===v?' active':''),onClick:()=>setView(v)},v.charAt(0).toUpperCase()+v.slice(1))
        )
      ),
      e('div',{style:{display:'flex',alignItems:'center',gap:'7px'}},
        syncing&&e('div',{className:'syncing'},e('div',{className:'spinner-sm'}),'Syncing'),
        e('div',{style:{fontSize:'12px',color:'var(--text3)',padding:'4px 8px'}},user.email?.split('@')[0])
      )
    ),

    // Main layout
    e('div',{className:'main'},
      Sidebar(),
      e('div',{className:'content'},CurrentView())
    ),

    // Mobile bottom nav
    e('nav',{className:'mobile-nav'},
      [{id:'today',icon:'🍽',label:'Today'},{id:'week',icon:'📊',label:'Week'},{id:'chat',icon:'💬',label:'Chat'},{id:'goals',icon:'🎯',label:'Goals'},{id:'settings',icon:'⚙️',label:'More'}].map(t=>
        e('button',{key:t.id,className:'mnav-btn'+(view===t.id?' active':''),onClick:()=>setView(t.id)},
          e('span',{className:'mnav-icon'},t.icon),
          t.label
        )
      )
    )
  );
}

// ─── Root ─────────────────────────────────────────────────────
function Root() {
  const e=React.createElement;
  const [user,setUser]=useState(null);
  const [checking,setChecking]=useState(true);

  useEffect(()=>{
    sb.auth.getSession().then(({data})=>{setUser(data.session?.user||null);setChecking(false);});
    const {data:l}=sb.auth.onAuthStateChange((_,session)=>setUser(session?.user||null));
    return()=>l.subscription.unsubscribe();
  },[]);

  if(checking)return e('div',{style:{height:'100vh',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:'14px',background:'#0a0a08'}},
    e('div',{style:{fontFamily:'DM Serif Display,serif',fontSize:'28px',color:'#ff6b1a'}},'GRAMS'),
    e('div',{style:{width:'18px',height:'18px',border:'2px solid #302e1e',borderTopColor:'#ff6b1a',borderRadius:'50%',animation:'spin .7s linear infinite'}})
  );
  if(!user)return e(AuthScreen,{onAuth:setUser});
  return e(App,{user,onLogout:async()=>{await sb.auth.signOut();setUser(null);}});
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(Root));
</script>
</body>
</html>
