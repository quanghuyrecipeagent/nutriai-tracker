<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>GRAMS — Macro Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a08;--surface:#121108;--surface2:#1c1a10;--surface3:#242218;
  --border:#302e1e;--border2:#403e28;--text:#f2ead6;--text2:#9a9068;--text3:#5e5838;
  --accent:#ff6b1a;--accent2:#e05500;--accent-dim:#2a1a08;
  --protein:#ff6b1a;--carbs:#f0b429;--fat:#e08c3a;--fiber:#c97a30;
  --danger:#e03030;--radius:12px;--radius-sm:8px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;-webkit-text-size-adjust:100%;overflow-x:hidden}
button{font-family:'DM Sans',sans-serif;cursor:pointer;border:none;background:none}
input,textarea,select{font-family:'DM Sans',sans-serif}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes bob{0%,100%{transform:translateY(0);opacity:.4}50%{transform:translateY(-4px);opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* ── Auth ── */
.auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:radial-gradient(ellipse at 50% 0%,rgba(255,107,26,.08),transparent 60%)}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:32px;width:100%;max-width:380px}
.auth-logo{font-family:'DM Serif Display',serif;font-size:32px;color:var(--accent);text-align:center;margin-bottom:4px;letter-spacing:-1px}
.auth-sub{text-align:center;font-size:13px;color:var(--text3);margin-bottom:24px}
.auth-tabs{display:flex;gap:2px;background:var(--surface2);padding:3px;border-radius:var(--radius-sm);margin-bottom:18px;border:1px solid var(--border)}
.auth-tab{flex:1;padding:8px;border-radius:6px;font-size:13px;font-weight:500;color:var(--text2);text-align:center;cursor:pointer;transition:all .15s}
.auth-tab.on{background:var(--surface);color:var(--text)}
.af{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.af label{font-size:12px;color:var(--text3)}
.af input{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;color:var(--text);font-size:14px;outline:none;transition:border-color .15s;-webkit-appearance:none;width:100%}
.af input:focus{border-color:var(--accent)}
.auth-btn{width:100%;padding:12px;border-radius:var(--radius-sm);background:var(--accent);color:#0a0a08;font-size:14px;font-weight:700;margin-top:6px;border:none;cursor:pointer}
.auth-btn:disabled{opacity:.4}
.auth-msg{font-size:12px;text-align:center;margin-top:10px}

/* ── Shell ── */
.app{min-height:100vh;display:flex;flex-direction:column}
.header{border-bottom:1px solid var(--border);padding:0 18px;height:50px;display:flex;align-items:center;justify-content:space-between;background:var(--surface);position:sticky;top:0;z-index:60;flex-shrink:0}
.logo{font-family:'DM Serif Display',serif;font-size:19px;color:var(--accent)}
.desk-nav{display:flex;gap:2px}
.nb{padding:5px 11px;border-radius:var(--radius-sm);font-size:12px;font-weight:500;color:var(--text2);transition:all .15s;border:none;background:none;cursor:pointer}
.nb:hover{color:var(--text);background:var(--surface2)}
.nb.on{color:var(--accent);background:var(--accent-dim)}
.hbtn{padding:4px 9px;border-radius:var(--radius-sm);font-size:11px;color:var(--text3);border:1px solid var(--border);background:none;cursor:pointer;transition:all .15s}
.hbtn:hover{color:var(--text)}
.syncing{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:4px}
.spin-sm{width:9px;height:9px;border:1.5px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}

/* ── Layout ── */
.main{flex:1;display:flex;height:calc(100vh - 50px);overflow:hidden}
.sidebar{width:290px;flex-shrink:0;border-right:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;overflow:hidden}
.content{flex:1;overflow-y:auto;padding:18px;padding-bottom:24px}

/* ── Sidebar input ── */
.stop{padding:11px;border-bottom:1px solid var(--border);flex-shrink:0}
.mode-tabs{display:flex;gap:2px;background:var(--surface2);padding:3px;border-radius:var(--radius-sm);border:1px solid var(--border);margin-bottom:9px}
.mtab{flex:1;padding:5px 3px;border-radius:5px;font-size:11px;font-weight:500;color:var(--text3);text-align:center;cursor:pointer;transition:all .15s;white-space:nowrap}
.mtab.on{background:var(--surface);color:var(--accent)}
.sinput{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 10px;color:var(--text);font-size:12px;outline:none;transition:border-color .15s;-webkit-appearance:none;display:block}
.sinput:focus{border-color:var(--accent)}
.sinput.mb{margin-bottom:7px}
.crow{display:flex;gap:5px;align-items:flex-end}
.cta{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;color:var(--text);font-size:13px;resize:none;min-height:38px;max-height:90px;outline:none;line-height:1.5;-webkit-appearance:none}
.cta:focus{border-color:var(--border2)}
.sbtn{width:34px;height:34px;border-radius:var(--radius-sm);background:var(--accent);color:#0a0a08;font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;border:none;cursor:pointer;transition:all .15s}
.sbtn:hover{background:var(--accent2)}
.sbtn:disabled{opacity:.4;cursor:default}
.hint{font-size:10px;color:var(--text3);margin-top:5px;line-height:1.4}
.row-btns{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap}
.rbtn{font-size:11px;color:var(--text3);background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:3px 8px;cursor:pointer;transition:all .15s;white-space:nowrap}
.rbtn:hover{color:var(--text);border-color:var(--border2)}
.rbtn.on{color:var(--accent);border-color:rgba(255,107,26,.35)}
.ov-panel{margin-top:8px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px}
.ov-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-top:5px}
.mf{display:flex;flex-direction:column;gap:3px}
.mf label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em}
.mf input{background:var(--surface3);border:1px solid var(--border);border-radius:5px;padding:5px 8px;color:var(--text);font-size:12px;outline:none;width:100%;-webkit-appearance:none}
.man-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:7px}
.add-btn{width:100%;padding:8px;border-radius:var(--radius-sm);background:var(--accent);color:#0a0a08;font-size:13px;font-weight:700;border:none;cursor:pointer;margin-top:2px}

/* ── Log ── */
.log{flex:1;overflow-y:auto;padding:9px 10px;display:flex;flex-direction:column;gap:5px}
.li{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px;animation:fadeIn .2s ease}
.lh{display:flex;justify-content:space-between;align-items:flex-start;gap:5px}
.ln{font-size:13px;font-weight:500;color:var(--text);line-height:1.3}
.ldesc{font-size:10px;color:var(--text3);margin-top:2px;font-style:italic}
.lt{font-size:10px;color:var(--text3);flex-shrink:0}
.ldel{opacity:0;font-size:10px;color:var(--text3);cursor:pointer;padding:1px 3px;transition:opacity .15s;border:none;background:none}
.li:hover .ldel{opacity:1}
.ldel:hover{color:var(--danger)}
.pills{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
.mp{font-size:10px;font-weight:500;padding:2px 5px;border-radius:3px}
.mp.cal{background:rgba(255,107,26,.12);color:var(--accent)}
.mp.p{background:rgba(255,107,26,.15);color:var(--protein)}
.mp.c{background:rgba(240,180,41,.15);color:var(--carbs)}
.mp.f{background:rgba(224,140,58,.15);color:var(--fat)}
.mp.fi{background:rgba(201,122,48,.15);color:var(--fiber)}
.lbar{height:4px;border-radius:2px;display:flex;overflow:hidden;gap:1px;margin-top:5px;cursor:pointer}
.lbar-seg{height:100%}
.lbar-detail{display:flex;gap:7px;margin-top:4px;flex-wrap:wrap}
.lbar-lbl{font-size:10px;display:flex;align-items:center;gap:3px;color:var(--text2)}
.lbar-dot{width:6px;height:6px;border-radius:2px;flex-shrink:0}
.bubble{display:flex;gap:4px;align-items:center;padding:3px 0}
.log-save-btn{transition:color .15s}
.log-save-btn:hover:not(:disabled){color:var(--accent)!important}
.bubble span{width:4px;height:4px;border-radius:50%;background:var(--accent);animation:bob 1s ease-in-out infinite}
.bubble span:nth-child(2){animation-delay:.2s}
.bubble span:nth-child(3){animation-delay:.4s}

/* ── Cards ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.ctitle{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--text3);margin-bottom:12px;font-weight:500}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.snum{font-family:'DM Serif Display',serif;font-size:30px;line-height:1}
.sunit{font-size:12px;color:var(--text2);margin-left:3px}
.pbar{height:5px;background:var(--surface3);border-radius:3px;overflow:hidden;margin-top:6px}
.pfill{height:100%;border-radius:3px;transition:width .5s}
.mrow{display:flex;flex-direction:column;gap:4px;margin-bottom:11px}
.mlrow{display:flex;justify-content:space-between;align-items:baseline}
.mname{font-size:13px;font-weight:500}
.mvals{font-size:12px;color:var(--text2)}
.stitle{font-family:'DM Serif Display',serif;font-size:21px;margin-bottom:14px}
.savebtn{padding:8px 16px;border-radius:var(--radius-sm);background:var(--accent);color:#0a0a08;font-size:13px;font-weight:700;border:none;cursor:pointer;transition:all .15s}
.savebtn:hover{background:var(--accent2)}
.aibox{background:var(--accent-dim);border:1px solid rgba(255,107,26,.2);border-radius:var(--radius);padding:13px;font-size:13px;color:var(--text2);line-height:1.6;white-space:pre-wrap}
.aihdr{font-size:11px;color:var(--accent);font-weight:500;text-transform:uppercase;letter-spacing:.07em;margin-bottom:7px}
.wbars{display:flex;gap:3px;align-items:flex-end;height:70px}
.wbc{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.wb{width:100%;border-radius:3px 3px 0 0;min-height:3px;transition:height .4s}
.wbl{font-size:9px;color:var(--text3)}
.grow{display:flex;flex-direction:column;gap:4px;margin-bottom:9px}
.grow label{font-size:12px;color:var(--text3)}
.grow input,.grow select{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 10px;color:var(--text);font-size:13px;outline:none;width:100%;-webkit-appearance:none}
.grow input:focus{border-color:var(--accent)}
.empty{text-align:center;padding:28px 14px;color:var(--text3);font-size:13px}
.eico{font-size:26px;margin-bottom:7px;opacity:.5}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.mi{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 10px}
.mn{font-size:10px;color:var(--text3);margin-bottom:2px}
.mv{font-size:14px;font-weight:500}
.mbar{height:3px;background:var(--surface3);border-radius:2px;margin-top:4px;overflow:hidden}
.mfill{height:100%;border-radius:2px;transition:width .5s}

/* ── Overlay ── */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:200;display:flex;align-items:flex-end;justify-content:center;padding:0}
.ovbox{background:var(--surface);border:1px solid var(--border);border-top-left-radius:var(--radius);border-top-right-radius:var(--radius);width:100%;max-width:540px;max-height:90vh;display:flex;flex-direction:column;padding:18px;animation:slideUp .22s ease}
.ovtitle{font-family:'DM Serif Display',serif;font-size:18px}
.ovcl{font-size:16px;color:var(--text3);cursor:pointer;padding:2px 6px;border:none;background:none}
.ebtn{flex:1;padding:10px 4px;border-radius:var(--radius-sm);font-size:12px;font-weight:600;text-align:center;cursor:pointer;border:1px solid var(--border);transition:all .15s;background:none}
.ebtn.under{color:var(--carbs);border-color:rgba(240,180,41,.3)}
.ebtn.under:hover{background:rgba(240,180,41,.1)}
.ebtn.avg{color:var(--accent);border-color:rgba(255,107,26,.3)}
.ebtn.avg:hover{background:rgba(255,107,26,.1)}
.ebtn.over{color:var(--danger);border-color:rgba(224,48,48,.3)}
.ebtn.over:hover{background:rgba(224,48,48,.1)}
.cbtn-yes{padding:8px 18px;border-radius:var(--radius-sm);background:var(--danger);color:white;font-size:13px;font-weight:500;border:none;cursor:pointer}
.cbtn-no{padding:8px 18px;border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);font-size:13px;border:1px solid var(--border);cursor:pointer}
.lib-search{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 11px;color:var(--text);font-size:13px;outline:none;margin-bottom:10px;-webkit-appearance:none}
.lib-search:focus{border-color:var(--accent)}
.liblist{overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:6px}
.libitem{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 11px;animation:fadeIn .15s ease}
.libitem-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:5px}
.libname{font-size:13px;font-weight:500;color:var(--text)}
.libdesc{font-size:10px;color:var(--text3);font-style:italic;margin-top:1px}
.libbtn{padding:5px 11px;border-radius:var(--radius-sm);font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.libbtn.log{background:var(--accent);color:#0a0a08}
.libbtn.add{background:rgba(255,107,26,.15);color:var(--accent);border:1px solid rgba(255,107,26,.3)}
.libbtn.del{background:rgba(224,48,48,.1);color:var(--danger);border:1px solid rgba(224,48,48,.2)}
.portion-row{display:flex;align-items:center;gap:8px;margin-top:6px;padding-top:6px;border-top:1px solid var(--border)}
.portion-lbl{font-size:11px;color:var(--text3);flex-shrink:0}
.portion-slider{flex:1;-webkit-appearance:none;height:3px;border-radius:2px;background:var(--border2);outline:none;cursor:pointer}
.portion-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent);cursor:pointer}
.portion-val{font-size:12px;color:var(--accent);font-weight:600;min-width:28px;text-align:center}

/* ── Settings ── */
.tog-row{display:flex;justify-content:space-between;align-items:center;padding:9px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:5px}
.toglbl{font-size:13px}
.togdesc{font-size:11px;color:var(--text3);margin-top:2px}
.tog{width:34px;height:19px;border-radius:10px;background:var(--border2);position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.tog.on{background:var(--accent)}
.tog::after{content:'';position:absolute;width:13px;height:13px;border-radius:50%;background:white;top:3px;left:3px;transition:left .2s}
.tog.on::after{left:18px}
.rad-row{display:flex;justify-content:space-between;align-items:center;padding:9px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:5px;cursor:pointer}
.raddot{width:15px;height:15px;border-radius:50%;border:2px solid var(--border2);flex-shrink:0;transition:all .15s}
.raddot.on{border-color:var(--accent);background:var(--accent)}

/* ── Chat ── */
.chat-msgs{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:7px;margin-bottom:10px;padding-right:2px}
.cmsg{padding:10px 13px;border-radius:var(--radius-sm);font-size:13px;line-height:1.6;animation:fadeIn .2s ease;max-width:90%}
.cmsg.user{background:var(--accent-dim);border:1px solid rgba(255,107,26,.2);align-self:flex-end;color:var(--text)}
.cmsg.ai{background:var(--surface2);border:1px solid var(--border);color:var(--text2);align-self:flex-start}
.csugg{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 11px;font-size:12px;color:var(--text2);cursor:pointer;text-align:left;transition:all .15s;width:100%}
.csugg:hover{border-color:var(--border2);color:var(--text)}

/* ── History ── */
.hentry{padding:6px 0;border-top:1px solid var(--border)}
.hrow{display:flex;justify-content:space-between;align-items:flex-start;gap:7px}
.hname{font-size:13px;color:var(--text);font-weight:500;cursor:pointer;transition:color .15s}
.hname:hover{color:var(--accent)}
.hdesc{font-size:10px;color:var(--text3);font-style:italic;margin-top:1px}
.hpills{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px}
.hpill{cursor:pointer;transition:opacity .15s}
.hpill:hover{opacity:.65}
.iinput{background:var(--surface3);border:1px solid var(--accent);border-radius:4px;padding:2px 6px;color:var(--text);font-size:12px;outline:none;-webkit-appearance:none}
.adv-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px;margin-bottom:7px}
.adv-date{font-size:10px;color:var(--text3);margin-bottom:5px}
.adv-text{font-size:12px;color:var(--text2);line-height:1.6;white-space:pre-wrap}

/* ── Mobile bottom nav ── */
.mob-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--surface);border-top:1px solid var(--border);z-index:60;padding-bottom:env(safe-area-inset-bottom,0px);padding-top:2px}
.mnbtn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6px 2px 4px;font-size:9px;font-weight:500;color:var(--text3);gap:2px;cursor:pointer;border:none;background:none;font-family:'DM Sans',sans-serif;transition:color .15s}
.mnbtn.on{color:var(--accent)}
.mnico{font-size:17px;line-height:1}

/* ── Responsive ── */
@media(max-width:700px){
  .header{height:46px;padding:0 12px}
  .desk-nav{display:none}
  .main{flex-direction:column;height:auto;overflow:visible}
  .sidebar{width:100%;border-right:none;border-bottom:1px solid var(--border);max-height:48vh;min-height:0}
  .content{padding:12px;padding-bottom:72px}
  .mob-nav{display:flex}
  .g2{grid-template-columns:1fr}
  .ovbox{border-radius:var(--radius) var(--radius) 0 0;max-height:92vh}
  .stitle{font-size:18px;margin-bottom:12px}
}
@media(min-width:701px){
  .mob-nav{display:none!important}
}
</style>
</head>

// ── Date helpers using LOCAL timezone ─────────────────────────
function localDate(d) {
  d = d || new Date();
  // Use local year/month/day — never UTC
  const yr = d.getFullYear();
  const mo = String(d.getMonth()+1).padStart(2,'0');
  const dy = String(d.getDate()).padStart(2,'0');
  return `${yr}-${mo}-${dy}`;
}
function todayStr() { return localDate(new Date()); }
function last7Dates() {
  return Array.from({length:7},(_,i)=>{
    const d=new Date(); d.setDate(d.getDate()-(6-i)); return localDate(d);
  });
}
function localTime(isoStr) {
  // Display time in user's local timezone
  return new Date(isoStr).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
}

function AuthScreen({onAuth}) {
  const [tab,setTab]=useState('login');
  const [email,setEmail]=useState('');
  const [pass,setPass]=useState('');
  const [name,setName]=useState('');
  const [busy,setBusy]=useState(false);
  const [err,setErr]=useState('');
  const [msg,setMsg]=useState('');
  async function submit() {
    setErr('');setMsg('');setBusy(true);
    if(tab==='login'){
      const {data,error}=await sb.auth.signInWithPassword({email,password:pass});
      if(error)setErr(error.message); else onAuth(data.user);
    } else {
      const {data,error}=await sb.auth.signUp({email,password:pass,options:{data:{display_name:name}}});
      if(error)setErr(error.message);
      else if(data.user&&!data.session)setMsg('Check your email to confirm.');
      else if(data.user)onAuth(data.user);
    }
    setBusy(false);
  }
  const onK=e=>{if(e.key==='Enter')submit();};
  return h('div',{className:'auth-screen'},
    h('div',{className:'auth-card'},
      h('div',{className:'auth-logo'},'GRAMS'),
      h('div',{className:'auth-sub'},'AI-powered macro & nutrition tracking'),
      h('div',{className:'auth-tabs'},
        ['login','signup'].map(t=>h('div',{key:t,className:'auth-tab'+(tab===t?' on':''),onClick:()=>{setTab(t);setErr('');setMsg('')}},t==='login'?'Sign in':'Create account'))
      ),
      tab==='signup'&&h('div',{className:'af'},h('label',null,'Name'),h('input',{type:'text',placeholder:'Your name',value:name,onChange:e=>setName(e.target.value),onKeyDown:onK})),
      h('div',{className:'af'},h('label',null,'Email'),h('input',{type:'email',placeholder:'you@example.com',value:email,onChange:e=>setEmail(e.target.value),onKeyDown:onK})),
      h('div',{className:'af'},h('label',null,'Password'),h('input',{type:'password',placeholder:'••••••••',value:pass,onChange:e=>setPass(e.target.value),onKeyDown:onK})),
      h('button',{className:'auth-btn',onClick:submit,disabled:busy},busy?'Please wait…':tab==='login'?'Sign in':'Create account'),
      msg&&h('div',{className:'auth-msg',style:{color:'var(--accent)'}},msg),
      err&&h('div',{className:'auth-msg',style:{color:'var(--danger)'}},err)
    )
  );
}

function Bubble() { return h('div',{className:'bubble'},h('span'),h('span'),h('span')); }

function MacroBar({label,current,goal,color}) {
  const pct=goal>0?Math.min(100,(current/goal)*100):0;
  const over=current>goal&&goal>0;
  return h('div',{className:'mrow'},
    h('div',{className:'mlrow'},h('span',{className:'mname',style:{color}},label),h('span',{className:'mvals'},Math.round(current)+'g'+(goal>0?' / '+goal+'g':''))),
    goal>0&&h('div',{className:'pbar'},h('div',{className:'pfill',style:{width:pct+'%',background:over?'#e03030':color}}))
  );
}

function WeekChart({entries}) {
  const days=last7Dates(),tod=todayStr();
  const vals=days.map(d=>(entries[d]||[]).reduce((s,x)=>s+(x.calories||0),0));
  const max=Math.max(...vals,1);
  return h('div',{className:'wbars'},
    days.map((d,i)=>{
      const ht=Math.round((vals[i]/max)*62);
      return h('div',{key:d,className:'wbc'},
        h('div',{style:{fontSize:'9px',color:vals[i]>0?'var(--text2)':'transparent',marginBottom:'2px'}},vals[i]>0?Math.round(vals[i]):''),
        h('div',{className:'wb',style:{height:ht+'px',background:d===tod?'#ff6b1a':'rgba(255,107,26,.28)'}}),
        h('span',{className:'wbl'},['M','T','W','T','F','S','S'][i])
      );
    })
  );
}

function PieChart({protein,carbs,fat}) {
  const ref=useRef(null),chart=useRef(null);
  useEffect(()=>{
    if(!ref.current)return;
    if(chart.current)chart.current.destroy();
    const total=protein+carbs+fat;
    if(!total)return;
    chart.current=new Chart(ref.current,{type:'doughnut',data:{labels:['Protein','Carbs','Fat'],datasets:[{data:[protein,carbs,fat],backgroundColor:['#ff6b1a','#f0b429','#e08c3a'],borderWidth:0,hoverOffset:4}]},options:{responsive:true,maintainAspectRatio:false,cutout:'68%',plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${ctx.raw}g (${Math.round((ctx.raw/total)*100)}%)`}}}}});
    return()=>{if(chart.current)chart.current.destroy();};
  },[protein,carbs,fat]);
  const total=protein+carbs+fat;
  const pcts=[protein,carbs,fat].map(v=>total?Math.round((v/total)*100):0);
  return h('div',{style:{display:'flex',alignItems:'center',gap:'14px'}},
    h('div',{style:{width:'108px',height:'108px',flexShrink:0}},h('canvas',{ref})),
    h('div',{style:{display:'flex',flexDirection:'column',gap:'7px'}},
      [['Protein',pcts[0],'#ff6b1a'],['Carbs',pcts[1],'#f0b429'],['Fat',pcts[2],'#e08c3a']].map(([n,p,c])=>
        h('div',{key:n,style:{display:'flex',alignItems:'center',gap:'7px'}},
          h('div',{style:{width:'8px',height:'8px',borderRadius:'2px',background:c}}),
          h('span',{style:{fontSize:'12px',color:'var(--text2)',minWidth:'44px'}},n),
          h('span',{style:{fontSize:'13px',fontWeight:500,color:c}},p+'%')
        )
      )
    )
  );
}

function MealBarViz({entry,expanded,onToggle}) {
  const total=(entry.protein||0)+(entry.carbs||0)+(entry.fat||0)||1;
  const segs=[{c:'#ff6b1a',pct:((entry.protein||0)/total)*100,l:'P',v:entry.protein||0},{c:'#f0b429',pct:((entry.carbs||0)/total)*100,l:'C',v:entry.carbs||0},{c:'#e08c3a',pct:((entry.fat||0)/total)*100,l:'F',v:entry.fat||0}];
  return h('div',{onClick:onToggle},
    h('div',{className:'lbar'},segs.map((s,i)=>h('div',{key:i,className:'lbar-seg',style:{width:s.pct+'%',background:s.c}}))),
    expanded&&h('div',{className:'lbar-detail'},segs.map((s,i)=>h('div',{key:i,className:'lbar-lbl'},h('div',{className:'lbar-dot',style:{background:s.c}}),s.l+' '+s.v+'g ('+Math.round(s.pct)+'%)')))
  );
}

function LibraryOverlay({savedFoods,onLog,onAddToPrompt,onDelete,onClose,mode}) {
  const [search,setSearch]=useState('');
  const [portions,setPortions]=useState({});
  const filtered=savedFoods.filter(f=>!search||f.name.toLowerCase().includes(search.toLowerCase()));

  function getPortion(id){ return portions[id]||1; }
  function scaledMacros(food,p){
    return {calories:Math.round((food.calories||0)*p),protein:Math.round((food.protein||0)*p),carbs:Math.round((food.carbs||0)*p),fat:Math.round((food.fat||0)*p),fiber:Math.round((food.fiber||0)*p),micros:Object.fromEntries(Object.entries(food.micros||{}).map(([k,v])=>[k,Math.round(v*p)]))};
  }

  return h('div',{className:'ov',onClick:onClose},
    h('div',{className:'ovbox',onClick:e=>e.stopPropagation()},
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px'}},
        h('div',{className:'ovtitle'},mode==='add'?'Add base meal to prompt':'My food library'),
        h('button',{className:'ovcl',onClick:onClose},'✕')
      ),
      mode==='add'&&h('div',{style:{fontSize:'12px',color:'var(--text2)',marginBottom:'10px',lineHeight:1.5}},'Select a saved meal as your base. You can then add extra items in the AI prompt.'),
      h('input',{className:'lib-search',type:'text',placeholder:'Search saved foods…',value:search,onChange:e=>setSearch(e.target.value)}),
      h('div',{className:'liblist'},
        filtered.length===0&&h('div',{className:'empty'},h('div',{className:'eico'},'📚'),'No saved foods yet',h('div',{style:{marginTop:'5px',fontSize:'11px'}},'Add meals from the AI input or manual tab')),
        filtered.map(food=>{
          const p=getPortion(food.id);
          const sm=scaledMacros(food,p);
          return h('div',{key:food.id,className:'libitem'},
            h('div',{className:'libitem-top'},
              h('div',{style:{flex:1,minWidth:0}},
                h('div',{className:'libname'},food.name),
                food.description&&h('div',{className:'libdesc'},food.description)
              ),
              h('div',{style:{display:'flex',gap:'5px',flexShrink:0}},
                mode==='add'
                  ? h('button',{className:'libbtn add',onClick:()=>onAddToPrompt(food,p,sm)},'+ Use as base')
                  : h('button',{className:'libbtn log',onClick:()=>onLog(food,p,sm)},'Log'),
                h('button',{className:'libbtn del',onClick:()=>onDelete(food.id)},'✕')
              )
            ),
            h('div',{className:'pills'},
              h('span',{className:'mp cal'},sm.calories+' kcal'),
              h('span',{className:'mp p'},'P '+sm.protein+'g'),
              h('span',{className:'mp c'},'C '+sm.carbs+'g'),
              h('span',{className:'mp f'},'F '+sm.fat+'g'),
              food.use_count>1&&h('span',{style:{fontSize:'10px',color:'var(--text3)',padding:'2px 4px'}},'×'+food.use_count)
            ),
            h('div',{className:'portion-row'},
              h('span',{className:'portion-lbl'},'Portions:'),
              h('input',{type:'range',className:'portion-slider',min:'0.25',max:'4',step:'0.25',value:p,onChange:e=>setPortions(prev=>({...prev,[food.id]:parseFloat(e.target.value)}))}),
              h('span',{className:'portion-val'},p+'×')
            )
          );
        })
      )
    )
  );
}

// ── Main App ──────────────────────────────────────────────────
function App({user,onLogout}) {
  // Navigation
  const [view,setView]=useState('today');
  // Settings
  const [settings,setSettings]=useState({advancedMode:false,estimateMode:'ask',showMealBars:true});
  // Data
  const [entries,setEntries]=useState({});
  const [goals,setGoals]=useState(DEF_GOALS);
  const [savedFoods,setSavedFoods]=useState([]);
  const [adviceHistory,setAdviceHistory]=useState([]);
  // Input state
  const [inputMode,setInputMode]=useState('ai');
  const [aiText,setAiText]=useState('');
  const [mealName,setMealName]=useState('');
  const [baseMeal,setBaseMeal]=useState(null); // {food, portion, scaledMacros}
  const [showOverride,setShowOverride]=useState(false);
  const [override,setOverride]=useState({calories:'',protein:'',carbs:'',fat:'',fiber:''});
  const [manual,setManual]=useState({name:'',calories:'',protein:'',carbs:'',fat:'',fiber:''});
  const [saveToLib,setSaveToLib]=useState(false); // checkbox to save manual/AI entry to library
  const [photoPreview,setPhotoPreview]=useState(null); // {dataUrl, mediaType}
  const [editingMeal,setEditingMeal]=useState(null); // {entry, date}
  const fileInputRef=useRef(null);
  // UI state
  const [loading,setLoading]=useState(false);
  const [syncing,setSyncing]=useState(false);
  const [initDone,setInitDone]=useState(false);
  const [pendingFood,setPendingFood]=useState(null);
  const [expandedMeals,setExpandedMeals]=useState({});
  const [libMode,setLibMode]=useState(null); // null | 'log' | 'add'
  const [showConfirm,setShowConfirm]=useState(false);
  const [editName,setEditName]=useState(null);
  const [editMacro,setEditMacro]=useState(null);
  const [goalInput,setGoalInput]=useState({});
  const [weightUnit,setWeightUnit]=useState('kg');
  const [aiAdvice,setAiAdvice]=useState('');
  const [advLoading,setAdvLoading]=useState(false);
  const [chatMsgs,setChatMsgs]=useState([]);
  const [chatInput,setChatInput]=useState('');
  const [chatLoading,setChatLoading]=useState(false);
  const logRef=useRef(null);
  const chatRef=useRef(null);

  // ── Load ────────────────────────────────────────────────────
  useEffect(()=>{
    async function init(){
      setSyncing(true);
      const {data:prof}=await sb.from('profiles').select('*').eq('id',user.id).single();
      if(prof)setSettings(p=>({...p,advancedMode:prof.advanced_mode||false}));
      const {data:g}=await sb.from('goals').select('*').eq('user_id',user.id).single();
      if(g)setGoals({calories:g.calories,protein:g.protein,carbs:g.carbs,fat:g.fat,weight:g.weight,target_weight:g.target_weight,body_fat:g.body_fat,target_body_fat:g.target_body_fat});
      // Load 60 days of entries
      const since=new Date(); since.setDate(since.getDate()-60);
      const {data:fe}=await sb.from('food_entries').select('*').eq('user_id',user.id).gte('eaten_date',localDate(since)).order('eaten_at',{ascending:true});
      if(fe){
        const map={};
        fe.forEach(row=>{
          // Use eaten_date from DB (already corrected by SQL migration)
          // But recalculate from eaten_at in local time as fallback
          const d=row.eaten_date;
          if(!map[d])map[d]=[];
          map[d].push({id:row.id,name:row.name,description:row.description||'',calories:row.calories,protein:row.protein,carbs:row.carbs,fat:row.fat,fiber:row.fiber,micros:row.micros||{},time:localTime(row.eaten_at)});
        });
        setEntries(map);
      }
      const {data:sf}=await sb.from('saved_foods').select('*').eq('user_id',user.id).order('use_count',{ascending:false});
      if(sf)setSavedFoods(sf);
      const {data:ah}=await sb.from('ai_advice').select('*').eq('user_id',user.id).order('created_at',{ascending:false}).limit(10);
      if(ah)setAdviceHistory(ah);
      setSyncing(false); setInitDone(true);
    }
    init();
  },[user.id]);

  useEffect(()=>{logRef.current?.scrollIntoView({behavior:'smooth'});},[entries,loading]);
  useEffect(()=>{chatRef.current?.scrollIntoView({behavior:'smooth'});},[chatMsgs,chatLoading]);

  // ── Helpers ──────────────────────────────────────────────────
  const toDisplay=kg=>weightUnit==='lbs'?Math.round(kg*2.20462*10)/10:kg;
  const toKg=v=>weightUnit==='lbs'?Math.round(v/2.20462*10)/10:parseFloat(v);
  const unitLbl=weightUnit==='lbs'?'lbs':'kg';

  async function callClaude(messages,system){
    const res=await fetch('/api/claude',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-5-20250929',max_tokens:1000,system,messages})});
    if(!res.ok){const t=await res.text();throw new Error('API '+res.status+': '+t.slice(0,100));}
    const data=await res.json();
    if(data.error)throw new Error(data.error.message||JSON.stringify(data.error));
    return data.content.map(b=>b.type==='text'?b.text:'').filter(Boolean).join('\n').trim();
  }

  async function doSaveToLib(entry){
    const existing=savedFoods.find(f=>f.name.toLowerCase()===entry.name.toLowerCase());
    if(existing){
      await sb.from('saved_foods').update({use_count:existing.use_count+1,updated_at:new Date().toISOString()}).eq('id',existing.id);
      setSavedFoods(p=>p.map(f=>f.id===existing.id?{...f,use_count:f.use_count+1}:f).sort((a,b)=>b.use_count-a.use_count));
      return;
    }
    const row={user_id:user.id,name:entry.name,description:entry.description||'',calories:Math.round(entry.calories||0),protein:Math.round(entry.protein||0),carbs:Math.round(entry.carbs||0),fat:Math.round(entry.fat||0),fiber:Math.round(entry.fiber||0),micros:entry.micros||{}};
    const {data:saved}=await sb.from('saved_foods').insert(row).select().single();
    if(saved)setSavedFoods(p=>[saved,...p]);
  }

  async function saveEntry(entry){
    const tod=todayStr();
    // Always use local date for eaten_date
    const row={user_id:user.id,name:entry.name,description:entry.description||'',calories:Math.round(entry.calories||0),protein:Math.round(entry.protein||0),carbs:Math.round(entry.carbs||0),fat:Math.round(entry.fat||0),fiber:Math.round(entry.fiber||0),micros:entry.micros||{},eaten_date:tod,eaten_at:new Date().toISOString()};
    const {data:ins,error}=await sb.from('food_entries').insert(row).select().single();
    if(error)throw new Error('DB: '+error.message);
    if(ins){
      const display={...ins,time:localTime(ins.eaten_at)};
      setEntries(p=>({...p,[tod]:[...(p[tod]||[]),display]}));
      if(saveToLib||entry.autoSaveLib)await doSaveToLib(entry);
    }
  }

  function handlePhotoSelect(e){
    const file=e.target.files&&e.target.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=()=>{
      const dataUrl=reader.result; // data:image/jpeg;base64,xxxx
      const mediaType=file.type||'image/jpeg';
      const base64=dataUrl.split(',')[1];
      setPhotoPreview({dataUrl,base64,mediaType});
    };
    reader.readAsDataURL(file);
    e.target.value=''; // allow re-selecting same file
  }

  // ── AI send ──────────────────────────────────────────────────
  async function handleSend(){
    const msg=aiText.trim();
    const hasPhoto=!!photoPreview;
    if(!msg&&!hasPhoto)return;
    if(loading)return;
    setAiText('');
    if(!hasPhoto&&['clear','reset','delete all','wipe','start over'].some(p=>msg.toLowerCase().includes(p))){setShowConfirm(true);return;}
    setLoading(true);

    // Build system prompt — include base meal if set
    const baseInfo=baseMeal?`\n\nThe user already has a base meal: "${baseMeal.food.name}" (×${baseMeal.portion} portions). They are describing or showing ADDITIONAL items to add on top of it. Only estimate macros for the NEW additional items — do NOT include the base meal's macros, they are added separately by the app.`:'';
    const photoInfo=hasPhoto?`\n\nThe user has attached a photo of their food. Identify the food(s) in the image and estimate portion sizes visually. If they also wrote text, use it as additional context (e.g. clarifying ingredients, brand, or amount).`:'';

    const sys=`You are a precise nutrition AI. Return ONLY valid JSON, no markdown, no text outside the JSON.${baseInfo}${photoInfo}

{
  "name": "descriptive food name",
  "avg":   {"calories":number,"protein":number,"carbs":number,"fat":number,"fiber":number},
  "under": {"calories":number,"protein":number,"carbs":number,"fat":number,"fiber":number},
  "over":  {"calories":number,"protein":number,"carbs":number,"fat":number,"fiber":number}${settings.advancedMode?`,
  "micros":{"vitaminC":number,"vitaminD":number,"calcium":number,"iron":number,"sodium":number,"potassium":number,"magnesium":number,"zinc":number}`:''}
}
under=conservative, avg=standard, over=generous. All numbers, never null.`;

    // Build message content — image block + text block if photo present
    let userContent;
    if(hasPhoto){
      const content=[{type:'image',source:{type:'base64',media_type:photoPreview.mediaType,data:photoPreview.base64}}];
      content.push({type:'text',text:msg||'What food is this and what are its estimated macros?'});
      userContent=content;
    } else {
      userContent=msg;
    }

    try{
      const raw=await callClaude([{role:'user',content:userContent}],sys);
      const s=raw.indexOf('{'),en=raw.lastIndexOf('}');
      if(s===-1)throw new Error('No JSON: '+raw.slice(0,120));
      const food=JSON.parse(raw.slice(s,en+1));
      food.micros=food.micros||{};
      const applyOv=vals=>{const out={...vals};Object.keys(override).forEach(k=>{if(override[k]!=='')out[k]=parseFloat(override[k])||0;});return out;};
      food.avg=applyOv(food.avg);food.under=applyOv(food.under);food.over=applyOv(food.over);

      // If there's a base meal, COMBINE its macros into the food estimate (single entry, not two)
      if(baseMeal){
        const bm=baseMeal.scaledMacros;
        const addBase=vals=>({calories:(vals.calories||0)+(bm.calories||0),protein:(vals.protein||0)+(bm.protein||0),carbs:(vals.carbs||0)+(bm.carbs||0),fat:(vals.fat||0)+(bm.fat||0),fiber:(vals.fiber||0)+(bm.fiber||0)});
        food.avg=addBase(food.avg);food.under=addBase(food.under);food.over=addBase(food.over);
        // Merge micros too
        const baseMicros=baseMeal.food.micros||{};
        Object.keys(baseMicros).forEach(k=>{food.micros[k]=(food.micros[k]||0)+(baseMicros[k]||0)*baseMeal.portion;});
        // Combine the name: "Ground beef + rice and potato"
        food.name=baseMeal.food.name+' + '+food.name;
        food.baseMealLogged=true; // flag so we clear baseMeal after saving
      }

      if(settings.estimateMode==='ask'){
        setPendingFood(food);
      } else {
        const choice=settings.estimateMode==='under'?food.under:settings.estimateMode==='over'?food.over:food.avg;
        const finalName=mealName.trim()||food.name;
        const desc=mealName.trim()?food.name:'';
        await saveEntry({name:finalName,description:desc,...choice,micros:food.micros,autoSaveLib:saveToLib});
        if(food.baseMealLogged)setBaseMeal(null);
        setMealName('');setOverride({calories:'',protein:'',carbs:'',fat:'',fiber:''});setSaveToLib(false);setPhotoPreview(null);
      }
    } catch(err){
      const tod=todayStr();
      setEntries(p=>({...p,[tod]:[...(p[tod]||[]),{id:Date.now(),isError:true,name:'⚠ '+err.message,time:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}]}));
    }
    setLoading(false);
  }

    try{await saveEntry({name:finalName,description:desc,...vals,micros:pendingFood.micros||{},autoSaveLib:saveToLib});}catch(err){console.error(err);}
    if(pendingFood.baseMealLogged)setBaseMeal(null);

    return h('div',null,
      h('h1',{className:'stitle'},'This week'),
      h('div',{className:'card'},h('div',{className:'ctitle'},'Calories — last 7 days'),h(WeekChart,{entries})),
      h('div',{className:'g2',style:{marginBottom:'12px'}},
        [['Total calories',Math.round(weekTotals.calories),'kcal'],['Daily avg',Math.round(weekTotals.calories/7),'kcal'],['Total protein',Math.round(weekTotals.protein),'g'],['Avg protein/day',Math.round(weekTotals.protein/7),'g']].map(([lbl,val,unit])=>
          h('div',{key:lbl,className:'card',style:{marginBottom:0}},h('div',{className:'ctitle'},lbl),h('div',{style:{display:'flex',alignItems:'baseline',gap:'3px'}},h('span',{className:'snum',style:{fontSize:'24px'}},val),h('span',{className:'sunit'},unit)))
        )
      ),
      h('div',{className:'card'},
        h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px'}},
          h('div',{className:'ctitle',style:{margin:0}},'AI Coach'),
          h('button',{className:'savebtn',style:{fontSize:'12px',padding:'6px 12px'},onClick:getAdvice,disabled:advLoading},advLoading?'Analysing…':'Get advice')
        ),
        advLoading&&h(Bubble),
        aiAdvice&&h('div',null,h('div',{className:'aihdr'},'🤖 AI Coach'),h('div',{className:'aibox'},aiAdvice)),
        !aiAdvice&&!advLoading&&h('div',{className:'empty',style:{padding:'14px 0'}},'Click "Get advice" for a personalised weekly analysis')
      )
    );
  }

  function ViewChat(){
    return h('div',{style:{display:'flex',flexDirection:'column',height:'calc(100vh - 110px)'}},
      h('h1',{className:'stitle'},'Ask GRAMS'),
      h('div',{style:{fontSize:'13px',color:'var(--text2)',marginBottom:'12px',marginTop:'-10px'}},'Ask anything — "Can I fit a burger today?" • "How\'s my protein?" • "What can I eat for 400 kcal?"'),
      h('div',{className:'chat-msgs'},
        chatMsgs.length===0&&h('div',{className:'empty',style:{padding:'12px 0'}},
          h('div',{className:'eico'},'🤖'),
          h('div',{style:{marginBottom:'10px'}},'Ask me anything'),
          h('div',{style:{display:'flex',flexDirection:'column',gap:'5px'}},
            ['"Can I have a Big Mac today?"','"Am I hitting protein this week?"','"What can I eat for 400 kcal?"','"How do I reach my body fat goal?"'].map(q=>h('button',{key:q,className:'csugg',onClick:()=>setChatInput(q)},q))
          )
        ),
        chatMsgs.map((m,i)=>h('div',{key:i,className:'cmsg '+m.role},m.text)),
        chatLoading&&h('div',{className:'cmsg ai'},h(Bubble)),
        h('div',{ref:chatRef})
      ),
      h('div',{style:{display:'flex',gap:'6px'}},
        h('textarea',{className:'cta',style:{flex:1},placeholder:'Ask anything…',value:chatInput,onChange:e=>setChatInput(e.target.value),onKeyDown:e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();handleChat();}},rows:2}),
        h('button',{className:'sbtn',onClick:handleChat,disabled:chatLoading||!chatInput.trim()},chatLoading?'…':'↑')
      )
    );
  }

  function ViewGoals(){
    return h('div',null,
      h('h1',{className:'stitle'},'Goals'),
      h('div',{className:'card'},
        h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px'}},
          h('div',{className:'ctitle',style:{margin:0}},'Body stats'),
          h('div',{style:{display:'flex',gap:'2px',background:'var(--surface3)',padding:'3px',borderRadius:'var(--radius-sm)',border:'1px solid var(--border)'}},
            ['kg','lbs'].map(u=>h('button',{key:u,onClick:()=>setWeightUnit(u),style:{padding:'3px 9px',borderRadius:'5px',fontSize:'11px',fontWeight:600,cursor:'pointer',background:weightUnit===u?'var(--accent)':'transparent',color:weightUnit===u?'#0a0a08':'var(--text3)',border:'none',transition:'all .15s'}},u))
          )
        ),
        h('div',{className:'g2',style:{gap:'9px'}},
          [['weight','Current weight'],['target_weight','Target weight'],['body_fat','Body fat (%)'],['target_body_fat','Target BF (%)']].map(([k,lbl])=>{
            const isW=k==='weight'||k==='target_weight';
            return h('div',{key:k,className:'grow',style:{marginBottom:0}},h('label',null,lbl+(isW?' ('+unitLbl+')':' (%)')),h('input',{type:'number',placeholder:String(isW?toDisplay(goals[k]):goals[k]),value:goalInput[k]!==undefined?goalInput[k]:'',onChange:e=>setGoalInput(p=>({...p,[k]:e.target.value}))}));
          })
        )
      ),
      h('div',{className:'card'},
        h('div',{className:'ctitle'},'Daily macro targets'),
        h('div',{className:'g2',style:{gap:'9px'}},
          [['calories','Calories (kcal)'],['protein','Protein (g)'],['carbs','Carbs (g)'],['fat','Fat (g)']].map(([k,lbl])=>
            h('div',{key:k,className:'grow',style:{marginBottom:0}},h('label',null,lbl),h('input',{type:'number',placeholder:String(goals[k]),value:goalInput[k]!==undefined?goalInput[k]:'',onChange:e=>setGoalInput(p=>({...p,[k]:e.target.value}))}))
          )
        ),
        h('div',{style:{marginTop:'12px'}},h('button',{className:'savebtn',onClick:saveGoals},'Save goals'))
      )
    );
  }

  function ViewHistory(){
    return h('div',null,
      h('h1',{className:'stitle'},'History'),
      allEntries.length===0&&h('div',{className:'card'},h('div',{className:'empty'},h('div',{className:'eico'},'📋'),'No history yet')),
      allEntries.map(([date,dayEntries])=>{
        const t=dayEntries.reduce((a,x)=>({cal:a.cal+(x.calories||0),p:a.p+(x.protein||0),c:a.c+(x.carbs||0),f:a.f+(x.fat||0)}),{cal:0,p:0,c:0,f:0});
        const d=new Date(date+'T12:00:00');
        const lbl=date===tod?'Today':d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
        return h('div',{key:date,className:'card'},
          h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'9px'}},
            h('div',{style:{fontSize:'14px',fontWeight:500}},lbl),
            h('div',{style:{display:'flex',gap:'4px',flexWrap:'wrap'}},
              h('span',{className:'mp cal'},Math.round(t.cal)+' kcal'),
              h('span',{className:'mp p'},'P '+Math.round(t.p)+'g'),
              h('span',{className:'mp c'},'C '+Math.round(t.c)+'g'),
              h('span',{className:'mp f'},'F '+Math.round(t.f)+'g')
            )
          ),
          dayEntries.filter(x=>!x.isError).map(entry=>h('div',{key:entry.id,className:'hentry',style:{cursor:'pointer'},onClick:()=>setEditingMeal({entry,date})},
            h('div',{className:'hrow'},
              h('div',{style:{flex:1,minWidth:0}},
                h('div',{className:'hname'},entry.name,' ',h('span',{style:{fontSize:'10px',color:'var(--text3)',fontWeight:'normal'}},'✎')),
                entry.description&&h('div',{className:'hdesc'},entry.description)
              ),
              h('div',{style:{display:'flex',gap:'5px',alignItems:'center',flexShrink:0,marginLeft:'7px'}},
                h('span',{style:{color:'var(--text2)',fontSize:'12px'}},entry.calories+' kcal'),
                h('button',{onClick:e=>{e.stopPropagation();deleteEntry(date,entry.id);},style:{fontSize:'10px',color:'var(--text3)',cursor:'pointer',border:'none',background:'none'},onMouseEnter:e=>e.target.style.color='var(--danger)',onMouseLeave:e=>e.target.style.color='var(--text3)'},'✕')
              )
            ),
            h('div',{className:'hpills'},
              [['calories','cal','kcal',''],['protein','p','g','P '],['carbs','c','g','C '],['fat','f','g','F '],['fiber','fi','g','Fi ']].map(([field,cls,unit,pre])=>
                h('span',{key:field,className:'mp '+cls},
                  field==='calories'?(entry.calories||0)+' kcal':pre+(entry[field]||0)+'g'
                    )
              )
            )
          ))
        );
      })
    );
  }

  function ViewAdvice(){
    return h('div',null,
      h('h1',{className:'stitle'},'AI advice history'),
      adviceHistory.length===0&&h('div',{className:'card'},h('div',{className:'empty'},h('div',{className:'eico'},'🤖'),'No advice yet — go to Week → Get advice')),
      adviceHistory.map(a=>h('div',{key:a.id,className:'adv-item'},h('div',{className:'adv-date'},new Date(a.created_at).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'})),h('div',{className:'adv-text'},a.advice)))
    );
  }

  function ViewSettings(){
    return h('div',null,
      h('h1',{className:'stitle'},'Settings'),
      h('div',{className:'card'},
        h('div',{className:'ctitle'},'Tracking'),
        h('div',{className:'tog-row'},h('div',null,h('div',{className:'toglbl'},'Advanced mode'),h('div',{className:'togdesc'},'Track vitamins & minerals')),h('div',{className:'tog'+(settings.advancedMode?' on':''),onClick:()=>updSetting('advancedMode',!settings.advancedMode)})),
        h('div',{className:'tog-row'},h('div',null,h('div',{className:'toglbl'},'Meal macro bars'),h('div',{className:'togdesc'},'Colour bar on each log entry')),h('div',{className:'tog'+(settings.showMealBars?' on':''),onClick:()=>updSetting('showMealBars',!settings.showMealBars)}))
      ),
      h('div',{className:'card'},
        h('div',{className:'ctitle'},'AI estimate preference'),
        h('div',{style:{fontSize:'13px',color:'var(--text2)',marginBottom:'10px'}},'When AI looks up food, which estimate to log?'),
        [['ask','Ask me each time','Popup lets you pick under / avg / over'],['under','Always lower','Good for cutting'],['avg','Always average','Balanced'],['over','Always higher','Good for bulking']].map(([opt,lbl,desc])=>
          h('div',{key:opt,className:'rad-row',onClick:()=>updSetting('estimateMode',opt)},
            h('div',null,h('div',{className:'toglbl'},lbl),h('div',{className:'togdesc'},desc)),
            h('div',{className:'raddot'+(settings.estimateMode===opt?' on':'')})
          )
        )
      ),
      h('div',{className:'card'},
        h('div',{className:'ctitle'},'Account'),
        h('button',{className:'savebtn',style:{background:'rgba(224,48,48,.15)',color:'var(--danger)',marginRight:'9px'},onClick:()=>setShowConfirm(true)},'Clear all data'),
        h('button',{className:'savebtn',style:{background:'var(--surface2)',color:'var(--text2)',border:'1px solid var(--border)'},onClick:onLogout},'Sign out')
      )
    );
  }

  const VIEWS={today:ViewToday,week:ViewWeek,chat:ViewChat,goals:ViewGoals,history:ViewHistory,advice:ViewAdvice,settings:ViewSettings};
  const CurrentView=VIEWS[view]||ViewToday;

  return h('div',{className:'app'},

    // Library overlay
    libMode&&h(LibraryOverlay,{savedFoods,onLog:logFromLibrary,onAddToPrompt:addToPrompt,onDelete:deleteFromLibrary,onClose:()=>setLibMode(null),mode:libMode}),

    // Estimate overlay
    editingMeal&&h(EditMealOverlay,{
      entry:editingMeal.entry,
      advancedMode:settings.advancedMode,
      onSave:updates=>updateFullMeal(editingMeal.date,editingMeal.entry.id,updates),
      onDelete:()=>deleteAndCloseEdit(editingMeal.date,editingMeal.entry.id),
      onClose:()=>setEditingMeal(null)
    }),

    pendingFood&&h('div',{className:'ov'},
      h('div',{className:'ovbox'},
        h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'6px'}},h('div',{className:'ovtitle'},'Which estimate?'),h('button',{className:'ovcl',onClick:()=>setPendingFood(null)},'✕')),
        h('div',{style:{fontSize:'13px',color:'var(--accent)',fontWeight:500,marginBottom:'4px'}},mealName.trim()||pendingFood.name),
        h('div',{style:{fontSize:'12px',color:'var(--text2)',marginBottom:'14px',lineHeight:1.8,whiteSpace:'pre'}},
          'Under: '+pendingFood.under.calories+' kcal | '+pendingFood.under.protein+'p '+pendingFood.under.carbs+'c '+pendingFood.under.fat+'f\n'+
          'Avg:   '+pendingFood.avg.calories+' kcal | '+pendingFood.avg.protein+'p '+pendingFood.avg.carbs+'c '+pendingFood.avg.fat+'f\n'+
          'Over:  '+pendingFood.over.calories+' kcal | '+pendingFood.over.protein+'p '+pendingFood.over.carbs+'c '+pendingFood.over.fat+'f'
        ),
        h('div',{style:{display:'flex',gap:'7px'}},
          h('button',{className:'ebtn under',onClick:()=>handleEstimate('under')},'⬇ Under'),
          h('button',{className:'ebtn avg',onClick:()=>handleEstimate('avg')},'≈ Average'),
          h('button',{className:'ebtn over',onClick:()=>handleEstimate('over')},'⬆ Over')
        )
      )
    ),

    // Confirm overlay
    showConfirm&&h('div',{className:'ov',onClick:()=>setShowConfirm(false)},
      h('div',{className:'ovbox',style:{maxWidth:'340px',margin:'auto',borderRadius:'var(--radius)'},onClick:e=>e.stopPropagation()},
        h('div',{className:'ovtitle',style:{marginBottom:'8px'}},'Clear all data?'),
        h('div',{style:{fontSize:'13px',color:'var(--text2)',marginBottom:'18px',lineHeight:1.5}},'Permanently deletes all food entries and AI advice.'),
        h('div',{style:{display:'flex',gap:'9px',justifyContent:'center'}},h('button',{className:'cbtn-no',onClick:()=>setShowConfirm(false)},'Cancel'),h('button',{className:'cbtn-yes',onClick:clearAll},'Clear all'))
      )
    ),

    // Header
    h('header',{className:'header'},
      h('div',{className:'logo'},'GRAMS'),
      h('nav',{className:'desk-nav'},['today','week','chat','goals','history','advice','settings'].map(v=>h('button',{key:v,className:'nb'+(view===v?' on':''),onClick:()=>setView(v)},v.charAt(0).toUpperCase()+v.slice(1)))),
      h('div',{style:{display:'flex',alignItems:'center',gap:'6px'}},
        syncing&&h('div',{className:'syncing'},h('div',{className:'spin-sm'}),'Syncing'),
        h('div',{style:{fontSize:'11px',color:'var(--text3)',padding:'3px 7px'}},user.email?.split('@')[0])
      )
    ),

    // Main
    h('div',{className:'main'},
      Sidebar(),
      h('div',{className:'content'},CurrentView())
    ),

    // Mobile nav
    h('nav',{className:'mob-nav'},
      [{id:'today',ico:'🍽',lbl:'Today'},{id:'week',ico:'📊',lbl:'Week'},{id:'chat',ico:'💬',lbl:'Chat'},{id:'goals',ico:'🎯',lbl:'Goals'},{id:'settings',ico:'⚙️',lbl:'More'}].map(t=>
        h('button',{key:t.id,className:'mnbtn'+(view===t.id?' on':''),onClick:()=>setView(t.id)},h('span',{className:'mnico'},t.ico),t.lbl)
      )
    )
  );
}

// ── Root ──────────────────────────────────────────────────────
function Root() {
  const [user,setUser]=useState(null);
  const [checking,setChecking]=useState(true);
  useEffect(()=>{
    sb.auth.getSession().then(({data})=>{setUser(data.session?.user||null);setChecking(false);});
    const {data:l}=sb.auth.onAuthStateChange((_,session)=>setUser(session?.user||null));
    return()=>l.subscription.unsubscribe();
  },[]);
  if(checking)return h('div',{style:{height:'100vh',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:'14px',background:'#0a0a08'}},
    h('div',{style:{fontFamily:'DM Serif Display,serif',fontSize:'26px',color:'#ff6b1a'}},'GRAMS'),
    h('div',{style:{width:'16px',height:'16px',border:'2px solid #302e1e',borderTopColor:'#ff6b1a',borderRadius:'50%',animation:'spin .7s linear infinite'}})
  );
  if(!user)return h(AuthScreen,{onAuth:setUser});
  return h(App,{user,onLogout:async()=>{await sb.auth.signOut();setUser(null);}});
}
ReactDOM.createRoot(document.getElementById('root')).render(h(Root));
</script>
</body>
</html>
