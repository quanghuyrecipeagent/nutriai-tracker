<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRAMS — Macro Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a08;
  --surface:#121108;
  --surface2:#1c1a10;
  --surface3:#242218;
  --border:#302e1e;
  --border2:#403e28;
  --text:#f2ead6;
  --text2:#9a9068;
  --text3:#5e5838;
  --accent:#ff6b1a;
  --accent2:#e05500;
  --accent-dim:#2a1a08;
  --protein:#ff6b1a;
  --carbs:#f0b429;
  --fat:#e08c3a;
  --fiber:#c97a30;
  --danger:#e03030;
  --radius:12px;
  --radius-sm:8px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif}
button{font-family:'DM Sans',sans-serif;cursor:pointer;border:none;background:none}
input,textarea,select{font-family:'DM Sans',sans-serif}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--surface)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* AUTH */
.auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(ellipse at 50% 0%,rgba(255,107,26,0.08) 0%,transparent 60%)}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:40px;width:100%;max-width:400px}
.auth-logo{font-family:'DM Serif Display',serif;font-size:34px;color:var(--accent);text-align:center;margin-bottom:4px;letter-spacing:-1px}
.auth-tagline{text-align:center;font-size:13px;color:var(--text3);margin-bottom:32px}
.auth-tabs{display:flex;gap:2px;background:var(--surface2);padding:3px;border-radius:var(--radius-sm);margin-bottom:24px;border:1px solid var(--border)}
.auth-tab{flex:1;padding:8px;border-radius:6px;font-size:13px;font-weight:500;color:var(--text2);text-align:center;transition:all 0.15s;cursor:pointer}
.auth-tab.active{background:var(--surface);color:var(--text)}
.auth-field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.auth-field label{font-size:12px;color:var(--text3)}
.auth-field input{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;color:var(--text);font-size:14px;outline:none;transition:border-color 0.15s}
.auth-field input:focus{border-color:var(--accent)}
.auth-btn{width:100%;padding:12px;border-radius:var(--radius-sm);background:var(--accent);color:#0a0a08;font-size:14px;font-weight:700;margin-top:8px;transition:all 0.15s}
.auth-btn:hover{background:var(--accent2)}
.auth-btn:disabled{opacity:0.4;cursor:default}
.auth-error{font-size:12px;color:var(--danger);text-align:center;margin-top:10px;min-height:18px}

/* APP */
.app{min-height:100vh;display:flex;flex-direction:column}
.header{border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;background:var(--surface)}
.logo{font-family:'DM Serif Display',serif;font-size:22px;color:var(--accent);letter-spacing:-0.5px}
.nav{display:flex;gap:4px}
.nav-btn{padding:6px 14px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;color:var(--text2);transition:all 0.15s}
.nav-btn:hover{color:var(--text);background:var(--surface2)}
.nav-btn.active{color:var(--accent);background:var(--accent-dim)}
.header-right{display:flex;align-items:center;gap:10px}
.mode-toggle{display:flex;align-items:center;gap:8px;padding:6px 12px;border-radius:var(--radius-sm);background:var(--surface2);border:1px solid var(--border);cursor:pointer;font-size:12px;color:var(--text2);transition:all 0.15s}
.mode-toggle.advanced{color:var(--accent);border-color:rgba(255,107,26,0.3)}
.dot{width:6px;height:6px;border-radius:50%;background:var(--text3)}
.mode-toggle.advanced .dot{background:var(--accent)}
.user-pill{padding:5px 10px;border-radius:var(--radius-sm);background:var(--surface2);border:1px solid var(--border);font-size:12px;color:var(--text2)}
.logout-btn{padding:5px 10px;border-radius:var(--radius-sm);font-size:12px;color:var(--text3);border:1px solid var(--border);transition:all 0.15s}
.logout-btn:hover{color:var(--danger);border-color:rgba(224,48,48,0.3)}
.clear-btn{padding:6px 14px;border-radius:var(--radius-sm);background:rgba(224,48,48,0.1);color:var(--danger);font-size:12px;font-weight:500;border:1px solid rgba(224,48,48,0.2);transition:all 0.15s}
.clear-btn:hover{background:rgba(224,48,48,0.2)}
.syncing{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:10px;height:10px;border:1.5px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite}

/* LAYOUT */
.main{flex:1;display:flex}
.sidebar{width:320px;border-right:1px solid var(--border);background:var(--surface);display:flex;flex-direction:column;height:calc(100vh - 56px);overflow:hidden}
.content{flex:1;overflow-y:auto;padding:24px}
.sidebar-top{padding:16px;border-bottom:1px solid var(--border)}
.chat-input-wrap{display:flex;gap:8px;align-items:flex-end}
.chat-textarea{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;color:var(--text);font-size:13px;resize:none;min-height:40px;max-height:120px;outline:none;transition:border-color 0.15s;line-height:1.5}
.chat-textarea:focus{border-color:var(--border2)}
.send-btn{width:36px;height:36px;border-radius:var(--radius-sm);background:var(--accent);color:#0a0a08;font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s}
.send-btn:hover{background:var(--accent2)}
.send-btn:disabled{opacity:0.4;cursor:default}
.hint{font-size:11px;color:var(--text3);margin-top:6px;line-height:1.4}
.log{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:8px}
.log-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px}
.log-item-header{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.log-name{font-size:13px;font-weight:500;color:var(--text);line-height:1.3}
.log-time{font-size:11px;color:var(--text3);flex-shrink:0}
.log-macros{display:flex;gap:8px;margin-top:6px;flex-wrap:wrap}
.macro-pill{font-size:11px;font-weight:500;padding:2px 7px;border-radius:4px}
.macro-pill.p{background:rgba(255,107,26,0.15);color:var(--protein)}
.macro-pill.c{background:rgba(240,180,41,0.15);color:var(--carbs)}
.macro-pill.f{background:rgba(224,140,58,0.15);color:var(--fat)}
.macro-pill.fi{background:rgba(201,122,48,0.15);color:var(--fiber)}
.macro-pill.cal{background:rgba(255,107,26,0.12);color:var(--accent)}
.log-del{opacity:0;font-size:11px;color:var(--text3);transition:opacity 0.15s;cursor:pointer;padding:2px 4px;border-radius:4px}
.log-item:hover .log-del{opacity:1}
.log-del:hover{color:var(--danger)}
.loading-bubble{display:flex;gap:4px;align-items:center;padding:4px 0}
.loading-bubble span{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:bob 1s ease-in-out infinite}
.loading-bubble span:nth-child(2){animation-delay:0.2s}
.loading-bubble span:nth-child(3){animation-delay:0.4s}
@keyframes bob{0%,100%{transform:translateY(0);opacity:0.4}50%{transform:translateY(-4px);opacity:1}}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.card-title{font-size:12px;text-transform:uppercase;letter-spacing:0.08em;color:var(--text3);margin-bottom:16px;font-weight:500}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.stat-big{font-family:'DM Serif Display',serif;font-size:36px;line-height:1;color:var(--text)}
.stat-unit{font-size:13px;color:var(--text2);margin-left:4px}
.progress-bar{height:6px;background:var(--surface3);border-radius:3px;overflow:hidden;margin-top:8px}
.progress-fill{height:100%;border-radius:3px;transition:width 0.6s ease}
.macro-row{display:flex;flex-direction:column;gap:6px}
.macro-label-row{display:flex;justify-content:space-between;align-items:baseline}
.macro-name{font-size:13px;font-weight:500}
.macro-vals{font-size:12px;color:var(--text2)}
.section-title{font-family:'DM Serif Display',serif;font-size:24px;margin-bottom:20px;color:var(--text)}
.section-subtitle{font-size:13px;color:var(--text2);margin-top:-16px;margin-bottom:20px}
.save-btn{padding:10px 20px;border-radius:var(--radius-sm);background:var(--accent);color:#0a0a08;font-size:13px;font-weight:700;transition:all 0.15s}
.save-btn:hover{background:var(--accent2)}
.save-btn:disabled{opacity:0.4;cursor:default}
.ai-advice{background:var(--accent-dim);border:1px solid rgba(255,107,26,0.2);border-radius:var(--radius);padding:16px;font-size:13px;color:var(--text2);line-height:1.6;white-space:pre-wrap}
.ai-advice-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;font-size:12px;color:var(--accent);font-weight:500;text-transform:uppercase;letter-spacing:0.08em}
.week-bar-wrap{display:flex;gap:4px;align-items:flex-end;height:90px}
.week-bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.week-bar{width:100%;border-radius:3px 3px 0 0;min-height:4px;transition:height 0.4s ease}
.day-label{font-size:10px;color:var(--text3)}
.goal-input-row{display:flex;flex-direction:column;gap:6px}
.goal-input-row label{font-size:12px;color:var(--text3)}
.goal-input-row input{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 12px;color:var(--text);font-size:13px;outline:none;transition:border-color 0.15s;width:100%}
.goal-input-row input:focus{border-color:var(--accent)}
.empty-state{text-align:center;padding:40px 20px;color:var(--text3);font-size:13px}
.empty-icon{font-size:32px;margin-bottom:10px;opacity:0.5}
.micro-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.micro-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px}
.micro-name{font-size:11px;color:var(--text3);margin-bottom:2px}
.micro-val{font-size:15px;font-weight:500;color:var(--text)}
.micro-goal-bar{height:3px;background:var(--surface3);border-radius:2px;margin-top:6px;overflow:hidden}
.micro-goal-fill{height:100%;border-radius:2px;transition:width 0.5s ease}
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);display:flex;align-items:center;justify-content:center;z-index:999}
.confirm-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;max-width:320px;text-align:center}
.confirm-title{font-family:'DM Serif Display',serif;font-size:20px;margin-bottom:8px}
.confirm-text{font-size:13px;color:var(--text2);margin-bottom:20px;line-height:1.5}
.confirm-btns{display:flex;gap:10px;justify-content:center}
.confirm-yes{padding:8px 20px;border-radius:var(--radius-sm);background:var(--danger);color:white;font-size:13px;font-weight:500}
.confirm-no{padding:8px 20px;border-radius:var(--radius-sm);background:var(--surface2);color:var(--text);font-size:13px;font-weight:500;border:1px solid var(--border)}
.advice-history-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;margin-bottom:10px}
.advice-history-date{font-size:11px;color:var(--text3);margin-bottom:8px}
.advice-history-text{font-size:12px;color:var(--text2);line-height:1.6;white-space:pre-wrap}
</style>
</head>
<body>
<div id="root"></div>
<script>
const SUPABASE_URL  = 'https://zadiqpsrtkuxjsvyyncb.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InphZGlxcHNydGt1eGpzdnl5bmNiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2NDczMDksImV4cCI6MjA5NTIyMzMwOX0.1sAhTCse0BNigpp0CdmCeCNQ-N5WaOqxkLsdpSjf8Ww';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

const { useState, useEffect, useRef } = React;

function getToday() { return new Date().toISOString().split('T')[0]; }
function getLast7Days() {
  return Array.from({ length: 7 }, (_, i) => {
    const d = new Date(); d.setDate(d.getDate() - (6 - i));
    return d.toISOString().split('T')[0];
  });
}

const DEFAULT_GOALS = { calories:2000, protein:150, carbs:200, fat:65, weight:75, target_weight:70, body_fat:20, target_body_fat:15 };

const MICRO_GOALS = {
  vitaminC:  { label:'Vitamin C',   unit:'mg',  goal:90   },
  vitaminD:  { label:'Vitamin D',   unit:'mcg', goal:15   },
  calcium:   { label:'Calcium',     unit:'mg',  goal:1000 },
  iron:      { label:'Iron',        unit:'mg',  goal:18   },
  sodium:    { label:'Sodium',      unit:'mg',  goal:2300 },
  potassium: { label:'Potassium',   unit:'mg',  goal:4700 },
  magnesium: { label:'Magnesium',   unit:'mg',  goal:420  },
  zinc:      { label:'Zinc',        unit:'mg',  goal:11   }
};
const MICRO_COLORS = {
  vitaminC:'#f0b429', vitaminD:'#ff6b1a', calcium:'#e08c3a', iron:'#c97a30',
  sodium:'#e03030', potassium:'#ff9950', magnesium:'#e07040', zinc:'#ffb347'
};

// ── Auth Screen ───────────────────────────────────────────────
function AuthScreen({ onAuth }) {
  const [tab, setTab]     = useState('login');
  const [email, setEmail] = useState('');
  const [pass, setPass]   = useState('');
  const [name, setName]   = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');
  const [msg, setMsg]     = useState('');

  async function submit() {
    setError(''); setMsg(''); setLoading(true);
    if (tab === 'login') {
      const { data, error: e } = await sb.auth.signInWithPassword({ email, password: pass });
      if (e) setError(e.message); else onAuth(data.user);
    } else {
      const { data, error: e } = await sb.auth.signUp({ email, password: pass, options: { data: { display_name: name } } });
      if (e) setError(e.message);
      else if (data.user && !data.session) setMsg('Check your email to confirm, then sign in.');
      else if (data.user) onAuth(data.user);
    }
    setLoading(false);
  }

  const onKey = e => { if (e.key === 'Enter') submit(); };

  return React.createElement('div', { className: 'auth-screen' },
    React.createElement('div', { className: 'auth-card' },
      React.createElement('div', { className: 'auth-logo' }, 'GRAMS'),
      React.createElement('div', { className: 'auth-tagline' }, 'AI-powered macro & nutrition tracking'),
      React.createElement('div', { className: 'auth-tabs' },
        ['login','signup'].map(t =>
          React.createElement('div', { key:t, className:'auth-tab'+(tab===t?' active':''), onClick:()=>{setTab(t);setError('');setMsg('')} },
            t === 'login' ? 'Sign in' : 'Create account'
          )
        )
      ),
      tab === 'signup' && React.createElement('div', { className:'auth-field' },
        React.createElement('label', null, 'Display name'),
        React.createElement('input', { type:'text', placeholder:'Your name', value:name, onChange:e=>setName(e.target.value), onKeyDown:onKey })
      ),
      React.createElement('div', { className:'auth-field' },
        React.createElement('label', null, 'Email'),
        React.createElement('input', { type:'email', placeholder:'you@example.com', value:email, onChange:e=>setEmail(e.target.value), onKeyDown:onKey })
      ),
      React.createElement('div', { className:'auth-field' },
        React.createElement('label', null, 'Password'),
        React.createElement('input', { type:'password', placeholder:'••••••••', value:pass, onChange:e=>setPass(e.target.value), onKeyDown:onKey })
      ),
      React.createElement('button', { className:'auth-btn', onClick:submit, disabled:loading },
        loading ? 'Please wait…' : tab === 'login' ? 'Sign in' : 'Create account'
      ),
      msg   && React.createElement('div', { style:{fontSize:'12px',color:'var(--accent)',textAlign:'center',marginTop:'12px'} }, msg),
      error && React.createElement('div', { className:'auth-error' }, error)
    )
  );
}

// ── Confirm Dialog ────────────────────────────────────────────
function ConfirmDialog({ title, text, onYes, onNo }) {
  return React.createElement('div', { className:'confirm-overlay', onClick:onNo },
    React.createElement('div', { className:'confirm-box', onClick:e=>e.stopPropagation() },
      React.createElement('div', { className:'confirm-title' }, title),
      React.createElement('div', { className:'confirm-text' }, text),
      React.createElement('div', { className:'confirm-btns' },
        React.createElement('button', { className:'confirm-no', onClick:onNo }, 'Cancel'),
        React.createElement('button', { className:'confirm-yes', onClick:onYes }, 'Clear all')
      )
    )
  );
}

// ── Macro Bar ─────────────────────────────────────────────────
function MacroBar({ label, current, goal, color }) {
  const pct  = goal > 0 ? Math.min(100, (current / goal) * 100) : 0;
  const over = current > goal && goal > 0;
  return React.createElement('div', { className:'macro-row' },
    React.createElement('div', { className:'macro-label-row' },
      React.createElement('span', { className:'macro-name', style:{color} }, label),
      React.createElement('span', { className:'macro-vals' }, `${Math.round(current)}g${goal>0?` / ${goal}g`:''}`)
    ),
    goal > 0 && React.createElement('div', { className:'progress-bar' },
      React.createElement('div', { className:'progress-fill', style:{ width:pct+'%', background:over?'#e03030':color } })
    )
  );
}

// ── Week Bar Chart ────────────────────────────────────────────
function WeekChart({ entries }) {
  const days  = getLast7Days();
  const today = getToday();
  const vals  = days.map(d => (entries[d]||[]).reduce((s,e)=>s+(e.calories||0), 0));
  const max   = Math.max(...vals, 1);
  return React.createElement('div', { className:'week-bar-wrap' },
    days.map((d, i) => {
      const h = Math.round((vals[i] / max) * 76);
      return React.createElement('div', { key:d, className:'week-bar-col' },
        React.createElement('div', { style:{fontSize:'10px',color:vals[i]>0?'var(--text2)':'transparent',marginBottom:'2px'} }, vals[i]>0?Math.round(vals[i]):''),
        React.createElement('div', { className:'week-bar', style:{ height:h+'px', background:d===today?'#ff6b1a':'rgba(255,107,26,0.28)' } }),
        React.createElement('span', { className:'day-label' }, ['M','T','W','T','F','S','S'][i])
      );
    })
  );
}

// ── Doughnut Chart ────────────────────────────────────────────
function PieChart({ protein, carbs, fat }) {
  const ref   = useRef(null);
  const chart = useRef(null);
  useEffect(() => {
    if (!ref.current) return;
    if (chart.current) chart.current.destroy();
    const total = protein + carbs + fat;
    if (total === 0) return;
    chart.current = new Chart(ref.current, {
      type: 'doughnut',
      data: {
        labels: ['Protein','Carbs','Fat'],
        datasets: [{ data:[protein,carbs,fat], backgroundColor:['#ff6b1a','#f0b429','#e08c3a'], borderWidth:0, hoverOffset:4 }]
      },
      options: {
        responsive:true, maintainAspectRatio:false, cutout:'68%',
        plugins:{ legend:{display:false}, tooltip:{ callbacks:{ label:ctx=>` ${ctx.raw}g (${Math.round((ctx.raw/total)*100)}%)` } } }
      }
    });
    return () => { if (chart.current) chart.current.destroy(); };
  }, [protein,carbs,fat]);

  const total = protein + carbs + fat;
  const pcts  = [protein,carbs,fat].map(v => total>0?Math.round((v/total)*100):0);
  return React.createElement('div', { style:{display:'flex',alignItems:'center',gap:'20px'} },
    React.createElement('div', { style:{position:'relative',width:'130px',height:'130px',flexShrink:0} },
      React.createElement('canvas', { ref })
    ),
    React.createElement('div', { style:{display:'flex',flexDirection:'column',gap:'10px'} },
      [['Protein',pcts[0],'#ff6b1a'],['Carbs',pcts[1],'#f0b429'],['Fat',pcts[2],'#e08c3a']].map(([n,p,c]) =>
        React.createElement('div', { key:n, style:{display:'flex',alignItems:'center',gap:'8px'} },
          React.createElement('div', { style:{width:'10px',height:'10px',borderRadius:'2px',background:c,flexShrink:0} }),
          React.createElement('span', { style:{fontSize:'13px',color:'var(--text2)',minWidth:'52px'} }, n),
          React.createElement('span', { style:{fontSize:'14px',fontWeight:500,color:c} }, p+'%')
        )
      )
    )
  );
}

// ── Main App ──────────────────────────────────────────────────
function App({ user, onLogout }) {
  const [view, setView]           = useState('today');
  const [advancedMode, setAdv]    = useState(false);
  const [entries, setEntries]     = useState({});
  const [goals, setGoals]         = useState(DEFAULT_GOALS);
  const [adviceHistory, setAdviceHistory] = useState([]);

  async function callClaude(messages, system) {
    const res = await fetch('/api/claude', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:1000, system, messages, tools:[{ type:'web_search_20250305', name:'web_search' }] })
    });
    const data = await res.json();
    return data.content.map(b => b.type==='text'?b.text:'').filter(Boolean).join('\n').trim();
  }

{
  "name": "food name",
  "calories": number,
  "protein": number,
  "carbs": number,
  "fat": number,
  "fiber": number${advancedMode ? `,
  "micros": { "vitaminC": number, "vitaminD": number, "calcium": number, "iron": number, "sodium": number, "potassium": number, "magnesium": number, "zinc": number }` : ''}
}

For restaurant/branded items use web search. Always return numbers, never null.`;

    try {
      const raw   = await callClaude([{ role:'user', content:msg }], system);

      const s = clean.indexOf('{'), e = clean.lastIndexOf('}');

      }

      setEntries(prev => ({ ...prev, [today]:[...(prev[today]||[]), { id:Date.now(), isError:true, name:"⚠ Couldn't identify that food. Try being more specific.", time:new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) }] }));
    }
    setLoading(false);
  }

            ? React.createElement('div',{className:'card'},React.createElement('div',{className:'empty-state'},React.createElement('div',{className:'empty-icon'},'🤖'),'No advice history yet',React.createElement('div',{style:{marginTop:'6px',fontSize:'11px'}},'Go to Week and click "Get advice"')))
            : adviceHistory.map(a=>
                React.createElement('div',{key:a.id,className:'advice-history-item'},
                  React.createElement('div',{className:'advice-history-date'},new Date(a.created_at).toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'})+' · Week of '+a.week_start),
                  React.createElement('div',{className:'advice-history-text'},a.advice)
                )
              )
        )
      )
    )
  );
}

// ── Root with auth gate ───────────────────────────────────────
function Root() {
  const [user, setUser]       = useState(null);
  const [checking, setChecking] = useState(true);

  useEffect(() => {
    sb.auth.getSession().then(({ data }) => {
      setUser(data.session?.user || null);
      setChecking(false);
    });
    const { data: listener } = sb.auth.onAuthStateChange((_e, session) => {
      setUser(session?.user || null);
    });
    return () => listener.subscription.unsubscribe();
  }, []);

  if (checking) return React.createElement('div', { style:{height:'100vh',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:'14px',background:'var(--bg)'} },
    React.createElement('div', { style:{fontFamily:'DM Serif Display,serif',fontSize:'28px',color:'var(--accent)',letterSpacing:'-0.5px'} }, 'GRAMS'),
    React.createElement('div', { style:{width:'20px',height:'20px',border:'2px solid var(--border2)',borderTopColor:'var(--accent)',borderRadius:'50%',animation:'spin 0.7s linear infinite'} })
  );

  if (!user) return React.createElement(AuthScreen, { onAuth: setUser });
  return React.createElement(App, { user, onLogout: async () => { await sb.auth.signOut(); setUser(null); } });
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(Root));
</script>
</body>
</html>
